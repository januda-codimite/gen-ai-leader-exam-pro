    topic:1,num:"228",
    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling “automotive experience.” Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n•	Modernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n•	Network upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n•	IT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives has established a dedicated Google Cloud Interconnect with 99.99% availability between its headquarters and two different metropolitan areas corresponding to the us-central1 and us-east1 Google Cloud regions. To minimize cost and latency between these workloads, you want to ensure all workloads in Google Cloud are deployed in these two regions as the VLAN attachment for the Cloud Interconnect. What should you do?",
    opts:["Schedule an export of all assets via Asset Inventory into BigQuery. Schedule a daily Cloud Run function to query the export and send out an alert if resources are created in regions outside of the allowed list.", "Ensure all deployments are done through Infrastructure as Code using standardized Terraform modules. Configure the region variable of all resources with a default value corresponding to one of the allowed regions.", "Limit the Google Cloud VPC used by the Cloud Interconnect to only have subnets in the allowed regions.", "Configure the Resource Location Restriction constraint organization policy at the organization level, and ensure only the allowed regions are listed."],
    ans:[3],
    desc:"The Resource Location Restriction organization policy constraint (constraints/gcp.resourceLocations) is a preventive, organization-wide guardrail that blocks the creation of resources outside an approved list of regions, regardless of whether they are deployed via console, gcloud, or Terraform. This makes it the only option that reliably enforces the region restriction at scale rather than relying on process or after-the-fact detection. Exporting Asset Inventory data to BigQuery and alerting via a scheduled function is a detective control that only flags violations after resources have already been created outside policy. Relying on a default Terraform variable value assumes every deployment goes through that specific module and default, which developers or other tooling could bypass. Restricting the VPC used by the Interconnect only controls network-layer connectivity for that VPC and does nothing to prevent other Google Cloud resources from being created in disallowed regions."
  },

    topic:1,num:"229",
    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling “automotive experience.” Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n•	Modernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n•	Network upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n•	IT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives is managing supplier data and pricing in a central MySQL database at headquarters (HQ). Only personnel at HQ are allowed to change the data. Each local plant stores a copy of the data in their own MySQL database, often using a different database schema or version. Every night a batch job exports any product or price updates in XML format from the central database at HQ and stores the updated data on a central FTP server. Each local plant must download this XML file and update their local system with the new information. The local data kept by some plants has become inconsistent with the source data due to XML parsing issues. HQ wants to easily verify that all changes are applied correctly at each plant.",
    opts:["Create a Pub/Sub topic per supplier, and have HQ publish all changes related to the respective supplier in JSON format on that topic. Allow all plants to create Pub/Sub Pull subscription to receive messages for their suppliers and update their databases.", "Create a Pub/Sub topic per supplier, and have HQ publish all changes related to the respective supplier in JSON format on that topic. Allow all plants to create Pub/Sub Push subscription to receive messages for their suppliers and update their databases.", "Migrate the self-hosted MySQL database at HQ to Cloud SQL. Standardize the database schema across all plants, and configure the local databases as external read replicas in Cloud SQL.", "Migrate the self-hosted MySQL database at HQ to Cloud SQL. Configure Database Migration Service between Cloud SQL and the on-premises databases. When creating the migration job. choose continuous migration instead of one-time migration."],
    ans:[0],
    desc:"Publishing supplier changes to a Pub/Sub topic per supplier in JSON format, with each plant using a pull subscription, gives every plant control over when it consumes and acknowledges updates, so a message is only marked processed once it has been successfully applied to that plant's local database. This directly addresses the described problem of inconsistent local data caused by fragile nightly XML parsing, since JSON is simpler to parse reliably and Pub/Sub provides durable, trackable delivery. A push subscription would require every plant to expose a reliably reachable HTTPS endpoint, which adds networking and security burden that plants with limited budgets and infrastructure may not be able to support. Migrating to Cloud SQL with the plants configured as external read replicas assumes a single standardized schema across all locations, but the plants currently run different schemas and versions, making this approach impractical without a much larger re-engineering effort. Database Migration Service is designed for migrating or continuously replicating an entire database, not for selectively synchronizing incremental per-supplier updates into independently-managed local schemas."

aking new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n•	Modernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n•	Network upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n•	IT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives wants to personalize the dealer experience for its customers and has decided to train its own AI models for personalized recommendations. The company will start collecting personally identifiable information (PII) from its customers to use as part of the models’ training data. KnightMotives wants to ensure maximum security and compliance worldwide. You need to ensure the data is encrypted both at rest and during AI model training without impacting the models’ accuracy. What should you do?",
    opts:["Store the training data in BigQuery using column-level encryption. Train the model using Confidential GKE Nodes.", "Store the training data in BigQuery using column-level encryption Train the model on VertexAI notebooks using customer-managed encryption keys.", "Process all data with Sensitive Data Protection’s de-identification service. Replace any PII with a random string before storing it. Train the model using Confidential GKE Nodes.", "Process all data with Sensitive Data Protection's de-identification service. Replace any PII with a random string before storing it. Train the model on VertexAI notebooks using customer-managed encryption keys."],
    ans:[0],
    desc:"Because the requirement explicitly states the solution must not impact model accuracy, replacing PII with a random string via de-identification is ruled out, since scrubbing the personal signal needed for personalized recommendations would degrade the very training data the model depends on. Storing the training data in BigQuery with column-level encryption keeps the data usable and reversible for authorized processes while satisfying encryption at rest. Training on Confidential GKE Nodes extends protection to data in use, since Confidential Computing encrypts memory during processing, satisfying the requirement to protect data throughout training, not just at rest. Training on Vertex AI notebooks with customer-managed encryption keys only protects data at rest and in transit, not while it is actively being processed in memory during training, so it does not meet the encryption-during-training requirement as fully as confidential computing does."

th on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. You are responsible for designing the network infrastructure architecture for KnightMotives's new environment on Google Cloud. You need to design the new VPC topology. You want to ensure a guaranteed bandwidth and low latency between the plants and Google Cloud resources. What should you do?",
    opts:["Create a Standard Tier VPC. and ensure a subnet is available in the region closest to a plant. Establish a Cloud Interconnect between each subnet and the local plant.", "Create a Standard Tier VPC. and ensure a subnet is available in the region closest to a plant Establish Direct Peering between Google's Edge Network and the local plant.", "Create a Premium Ter VPand ensure a subnet is available in the region closest to a plant. Establish a Cloud Interconnect between each subnet and the local plant.", "Create a Premium Ter VPC. and ensure a subnet is available in the region closest to a plant. Establish Direct Peering between Google's Edge Network and the local plant."],
    ans:[2],
    desc:"A Premium Tier VPC routes traffic over Google's global backbone network with consistent, low latency and SLA-backed performance, and pairing it with a Cloud Interconnect provides a private, dedicated connection with guaranteed bandwidth between each plant and the corresponding regional subnet. Standard Tier routes egress traffic over the public internet with no bandwidth or latency guarantees, which fails the stated requirement regardless of the connectivity method chosen alongside it. Direct Peering exchanges traffic with Google's edge network at peering locations but does not provide a dedicated, guaranteed-bandwidth private circuit the way Cloud Interconnect does, and it also requires meeting Google's peering traffic-volume criteria, making it less suitable for guaranteeing enterprise-grade connectivity to individual plants. Only the combination of Premium Tier plus Cloud Interconnect delivers both the guaranteed private bandwidth and the low, predictable latency the scenario calls for."

th on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. As part of its cloud strategy. KnightMotives wants to move its virtual machines (VMs) into Google Cloud. These VMs contain applications, database instances, and file servers. In the future, KnightMotives intends to modernize their landscape by adopting cloud native technologies on Google Cloud. During modernization, minimal latency and operational overhead between the old and new landscape will be crucial. You need to design the cloud architecture for the VM environment on Google Cloud while ensuring a future modernization track will meet the technical requirements. What should you do?",
    opts:["Create a Shared Virtual Private Cloud (VPC). and migrate the VMs to Compute Engine in a new project. During modernization, deploy each modernized workload in a dedicated Google Cloud project with its own VPC. Connect the two VPCs via an on-premises VPN.", "Create a Shared Virtual Private Cloud (VPC). Migrate the VMs to Compute Engine in a new project. During modernization, deploy each modernized workload in a dedicated Google Cloud project using the Shared VPC.", "Create a single private cloud on Google Cloud VMware Engine. Migrate the VMs using VMware HCX. During modernization, deploy the modernized workloads in a single Google Cloud project using a single VPC.", "Create a single private cloud on Google Cloud VMware Engine. Migrate the VMs using VMware HCX. During modernization, deploy each modernized workload in a dedicated Google Cloud project with its own VPC."],
    ans:[1],
    desc:"A Shared VPC lets Compute Engine VMs and, later, modernized workloads in separate service projects communicate over internal IPs within a single shared network, avoiding extra network hops and keeping latency low as the environment evolves. Deploying each modernized workload in its own project while still attaching to the same Shared VPC preserves this low-latency, low-overhead connectivity throughout the migration. Introducing a VPN between two independent VPCs, as in the alternative Shared VPC option, adds an unnecessary network boundary and latency between workloads that are all running inside Google Cloud. Using Google Cloud VMware Engine with VMware HCX is suited to lift-and-shift of VMware-based environments without conversion, but it does not advance the stated goal of adopting cloud-native technologies, and continuing to operate on VMware infrastructure during a supposed modernization effort works against minimizing long-term operational overhead and latency between old and new components."

    topic:1,num:"234",
    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling “automotive experience.” Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n•	Modernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n•	Network upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n•	IT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives has developed and deployed a model on Vertex AI that can provide personalized recommendations in the new car configuration application. Customers will receive optional equipment recommendations that best suit their persona. Previous usage data from the car configuration application has been used for model training features. You know from past experience that customer behavior can change over time. For example, in times of economic certainty and rising stock markets, customers tend to purchase more expensive options. You want to detect when customer behavior gradually changes over time so you can adjust the model. What should you do?",
    opts:["Configure Model Monitoring, and select training-serving skew detection.", "Configure Model Monitoring, and select prediction drift detection.", "Configure Dataplex auto data quality on the prediction request data features using row-level rules.", "Configure Dataplex auto data quality on the prediction request data features using aggregate rules."],
    ans:[1],
    desc:"Prediction drift detection in Vertex AI Model Monitoring continuously compares the statistical distribution of live prediction input data against a recent baseline over time, which is exactly what is needed to catch a gradual shift in customer purchasing behavior, such as trending toward pricier options during favorable economic conditions. Training-serving skew detection instead compares live serving data against the original training data distribution, which is better suited to catching a one-time mismatch introduced at deployment rather than a continuous behavioral drift occurring after deployment. Dataplex auto data quality rules, whether row-level or aggregate, validate that incoming data conforms to fixed expectations like nulls, ranges, or schema, but they are not designed to detect statistical distribution shifts in model inputs over time, so they would not surface the kind of behavioral drift described."

function questionImages(q){
  if(!q.images || !q.images.length) return '';
  return `<div class="q-images">${q.images.map(src=>`<img src="${esc(src)}" alt="Exhibit" loading="lazy">`).join('')}</div>`;
}

function buildExamCards(){
  const wrap = document.getElementById('exam-cards');
  wrap.innerHTML = '';
  Object.values(EXAMS).forEach(exam=>{
    const topics = new Set(exam.questions.map(q=>q.topic)).size;
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = `
      <div class="exam-card-title">${esc(exam.title)}</div>
      <div class="exam-card-sub">${esc(exam.shortTitle)}</div>
      <div class="exam-card-stats"><span>${exam.questions.length} Questions</span><span>${topics} Topics</span></div>
    `;
    card.onclick = ()=>selectExam(exam.id);
    wrap.appendChild(card);
  });
}

function selectExam(id){
  currentExam = EXAMS[id];
  document.getElementById('exam-select-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('exam-title').textContent = currentExam.title;
  document.getElementById('exam-subtitle').textContent = currentExam.subtitle;

  const total = currentExam.questions.length;
  const topics = new Set(currentExam.questions.map(q=>q.topic)).size;
  document.getElementById('info-topics').textContent = topics;
  document.getElementById('info-passing').textContent = currentExam.passPct + '%';

  const qSel = document.getElementById('qcount-select');
  qSel.innerHTML = '';
  [10,25,50,100,200].filter(n=>n<total).forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n+' Questions';
    if(currentExam.defaultCount === n) opt.selected = true;
    qSel.appendChild(opt);
  });
  const allOpt = document.createElement('option');
  allOpt.value = total; allOpt.textContent = `All (${total})`;
  if(!currentExam.defaultCount) allOpt.selected = true;
  qSel.appendChild(allOpt);

  updateStartInfo();
}

function updateStartInfo(){
  const numQ = parseInt(document.getElementById('qcount-select').value, 10);
  document.getElementById('info-questions').textContent = numQ;
  const mins = Math.max(5, Math.round(numQ * currentExam.paceMinPerQ));
  const h = Math.floor(mins/60), m = mins%60;
  document.getElementById('info-time').textContent = h>0 ? `${h}h ${m}m` : `${m}m`;
}

function backToExamSelect(){
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-select-screen').style.display = 'block';
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startExam() {
  const doShuffle = document.getElementById('shuffle-check').checked;
  const total = currentExam.questions.length;
  const numQ = Math.min(total, parseInt(document.getElementById('qcount-select').value, 10));
  let indices = [...Array(total).keys()];
  if(doShuffle) indices = shuffle(indices);
  order = indices.slice(0, numQ);
  answers = {};
  flags = new Set();
  current = 0;
  examTime = Math.max(300, Math.round(numQ * currentExam.paceMinPerQ * 60));
  timeLeft = examTime;
  examDone = false;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  buildNav();
  renderQuestion();
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  if(timeLeft <= 0) { timeLeft = 0; submitExam(); return; }
  const h = Math.floor(timeLeft/3600);
  const m = Math.floor((timeLeft%3600)/60);
  const s = timeLeft%60;
  const el = document.getElementById('timer');
  el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer' + (timeLeft < 300 ? ' danger' : timeLeft < 600 ? ' warning' : '');
}

function isAnswered(qi){ return !!(answers[qi] && answers[qi].length>0); }

function buildNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  for(let i=0;i<order.length;i++){
    const d = document.createElement('div');
    d.className = 'q-dot' + (i===current?' active':'') + (isAnswered(order[i])?' answered':'') + (flags.has(order[i])?' flagged':'');
    d.textContent = i+1;
    d.onclick = ()=>{current=i;renderQuestion();updateNav();};
    nav.appendChild(d);
  }
}
function updateNav(){
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((d,i)=>{
    d.className='q-dot'+(i===current?' active':'')+(isAnswered(order[i])?' answered':'')+(flags.has(order[i])?' flagged':'');
  });
  document.getElementById('progress-info').textContent = `${current+1} / ${order.length}`;
  document.getElementById('progress-bar').style.width = `${((current+1)/order.length)*100}%`;
  const fb = document.getElementById('flag-btn');
  fb.className = 'flag-btn'+(flags.has(order[current])?' flagged':'');
}

function renderQuestion(){
  const qi = order[current];
  const q = currentExam.questions[qi];
  const ansArr = normAns(q);
  const multi = ansArr.length > 1;
  const userSel = answers[qi] || [];
  const area = document.getElementById('question-area');
  let html = `<div class="question-card">
    <div class="q-topic">${esc(topicLabel(q))}</div>
    <div class="q-number">Question ${current+1} of ${order.length} (T${q.topic} Q${q.num})${multi?` <span class="multi-hint">Select ${ansArr.length} answers</span>`:''}</div>
    <div class="q-text">${esc(q.q)}</div>
    ${questionImages(q)}
    <div class="options">`;
  q.opts.forEach((o,oi)=>{
    const sel = userSel.includes(oi) ? ' selected':'';
    html += `<div class="option${sel}" onclick="selectOpt(${qi},${oi})">
      <div class="option-letter">${LETTERS[oi]}</div>
      <div class="option-text">${esc(o)}</div>
    </div>`;
  });
  html += `</div></div>`;
  area.innerHTML = html;
  updateNav();
}

function selectOpt(qi,oi){
  if(examDone) return;
  const q = currentExam.questions[qi];
  const ansArr = normAns(q);
  const multi = ansArr.length > 1;
  if(!answers[qi]) answers[qi] = [];
  if(multi){
    const idx = answers[qi].indexOf(oi);
    if(idx>=0) answers[qi].splice(idx,1);
    else answers[qi].push(oi);
  } else {
    answers[qi] = [oi];
  }
  renderQuestion();
}

function navQ(d){
  current = Math.max(0,Math.min(order.length-1,current+d));
  renderQuestion();
}

function toggleFlag(){
  const qi = order[current];
  if(flags.has(qi)) flags.delete(qi); else flags.add(qi);
  updateNav();
}

function submitExam(){
  const answeredCount = order.filter(qi=>isAnswered(qi)).length;
  const unanswered = order.length - answeredCount;
  if(unanswered > 0 && timeLeft > 0){
    if(!confirm(`You have ${unanswered} unanswered question(s). Are you sure you want to submit?`)) return;
  }
  clearInterval(timerInterval);
  examDone = true;
  showResults();
}

function isCorrect(q, userArr){
  const ansArr = normAns(q);
  if(!userArr || userArr.length===0) return false;
  const a = [...userArr].sort((x,y)=>x-y).join(',');
  const b = [...ansArr].sort((x,y)=>x-y).join(',');
  return a===b;
}

function showResults(){
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  let correct=0, incorrect=0, skipped=0;
  const results = order.map((qi)=>{
    const q = currentExam.questions[qi];
    const userAns = answers[qi] || [];
    if(userAns.length===0){skipped++;return{q,status:'skipped',userAns:[]};}
    if(isCorrect(q,userAns)){correct++;return{q,status:'correct',userAns};}
    incorrect++;return{q,status:'incorrect',userAns};
  });
  const pct = Math.round((correct/order.length)*100);
  const pass = pct >= currentExam.passPct;
  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle '+(pass?'pass':'fail');
  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-pct').style.color = pass?'var(--green)':'var(--red)';
  document.getElementById('score-label').textContent = pass?'PASSED':'FAILED';

  const timeTaken = examTime - timeLeft;
  const tm = Math.floor(timeTaken/60);
  const ts = timeTaken%60;

  document.getElementById('results-stats').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--green)">${correct}</div><div class="lbl">Correct</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${incorrect}</div><div class="lbl">Incorrect</div></div>
    <div class="stat"><div class="num" style="color:var(--yellow)">${skipped}</div><div class="lbl">Skipped</div></div>
    <div class="stat"><div class="num">${correct}/${order.length}</div><div class="lbl">Score</div></div>
    <div class="stat"><div class="num">${tm}m ${ts}s</div><div class="lbl">Time Taken</div></div>
  `;

  document.getElementById('filter-row').innerHTML = `
    <button class="filter-btn active" onclick="filterReview('all',this)">All (${order.length})</button>
    <button class="filter-btn" onclick="filterReview('incorrect',this)">Incorrect (${incorrect})</button>
    <button class="filter-btn" onclick="filterReview('correct',this)">Correct (${correct})</button>
    <button class="filter-btn" onclick="filterReview('skipped',this)">Skipped (${skipped})</button>
  `;

  window._results = results;
  renderReview('all');
  window.scrollTo(0,0);
}

function filterReview(type, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderReview(type);
}

function renderReview(filter){
  const area = document.getElementById('review-area');
  let html = '';
  window._results.forEach((r)=>{
    if(filter!=='all' && r.status!==filter) return;
    const q = r.q;
    const ansArr = normAns(q);
    const badgeClass = r.status==='correct'?'badge-correct':r.status==='incorrect'?'badge-incorrect':'badge-skipped';
    const cardClass = 'rc-'+r.status;
    html += `<div class="review-card ${cardClass}">
      <span class="review-badge ${badgeClass}">${r.status}</span>
      <div class="q-topic" style="margin-bottom:6px">${esc(topicLabel(q))} — Q${q.num}</div>
      <div class="review-q">${esc(q.q)}</div>
      ${questionImages(q)}
      <div class="review-options">`;
    q.opts.forEach((o,oi)=>{
      let icon = '';
      let style = '';
      const isAns = ansArr.includes(oi);
      const wasPicked = r.userAns.includes(oi);
      if(isAns){icon='✓';style='color:var(--green);font-weight:700'}
      if(wasPicked && !isAns){icon='✗';style='color:var(--red);font-weight:700'}
      html += `<div class="review-opt" style="${style}"><span class="marker">${LETTERS[oi]}.</span> ${esc(o)} ${icon?'<strong>'+icon+'</strong>':''}</div>`;
    });
    html += `</div>`;
    if(r.userAns.length>0 && r.status!=='correct'){
      html += `<div style="color:var(--red);font-size:.9rem;margin-bottom:4px"><strong>Your answer:</strong> ${r.userAns.map(i=>LETTERS[i]).join(', ')}</div>`;
    }
    html += `<div style="color:var(--green);font-size:.9rem;margin-bottom:8px"><strong>Correct answer:</strong> ${ansArr.map(i=>LETTERS[i]).join(', ')}</div>`;
    html += `<div class="discussion"><div class="discussion-title">📖 Discussion / Explanation</div>${esc(q.desc)}</div>`;
    html += `</div>`;
  });
  area.innerHTML = html;
}

document.addEventListener('keydown',e=>{
  if(examDone || !currentExam || document.getElementById('exam-screen').style.display==='none') return;
  if(e.key==='ArrowRight'||e.key==='n') navQ(1);
  if(e.key==='ArrowLeft'||e.key==='p') navQ(-1);
  if(/^[1-8]$/.test(e.key)) selectOpt(order[current], parseInt(e.key,10)-1);
  if(e.key==='a') selectOpt(order[current],0);
  if(e.key==='b') selectOpt(order[current],1);
  if(e.key==='c') selectOpt(order[current],2);
  if(e.key==='d') selectOpt(order[current],3);
  if(e.key==='f') toggleFlag();
});

buildExamCards();
</script>
</body>
</html>
