<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamTopics Exam Simulator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--text2:#94a3b8;--border:#475569}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}

/* START SCREEN */
#exam-select-screen{text-align:center;padding:80px 20px}
#start-screen{display:none;text-align:center;padding:80px 20px}
#start-screen h1,#exam-select-screen h1{font-size:2.5rem;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#start-screen .subtitle,#exam-select-screen .subtitle{color:var(--text2);font-size:1.1rem;margin-bottom:40px}
.info-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px;text-align:left}
.info-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.info-card .label{color:var(--text2);font-size:.85rem;margin-bottom:4px}
.info-card .value{font-size:1.3rem;font-weight:700}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:20px;text-align:left}
.exam-card{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.exam-card:hover{border-color:var(--accent);transform:translateY(-2px);background:rgba(99,102,241,.08)}
.exam-card .exam-card-title{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.exam-card .exam-card-sub{color:var(--accent2);font-size:.85rem;font-weight:600;margin-bottom:16px}
.exam-card .exam-card-stats{display:flex;gap:16px;color:var(--text2);font-size:.85rem}
.qcount-row{margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.qcount-row label{color:var(--text2)}
select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.95rem;cursor:pointer}
.btn{display:inline-block;padding:14px 40px;border-radius:10px;border:none;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:8px 20px;font-size:.9rem}
.btn-link{background:none;border:none;color:var(--text2);text-decoration:underline;cursor:pointer;font-size:.9rem;margin-top:16px}
.btn-link:hover{color:var(--text)}

/* EXAM HEADER */
#exam-screen{display:none}
.exam-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 0;margin-bottom:24px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.timer{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warning{color:var(--yellow)}
.timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-info{color:var(--text2);font-size:.9rem}
.progress-bar-bg{width:100%;height:6px;background:var(--card2);border-radius:99px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}

/* QUESTION CARD */
.question-card{background:var(--card);border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid var(--border)}
.q-topic{color:var(--accent2);font-size:.85rem;font-weight:600;margin-bottom:8px}
.q-number{font-size:1rem;color:var(--text2);margin-bottom:12px}
.multi-hint{color:var(--yellow);font-weight:600;font-size:.8rem;border:1px solid var(--yellow);border-radius:20px;padding:2px 10px;margin-left:6px}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:24px;white-space:pre-line}
.q-images{margin-bottom:24px}
.q-images img{max-width:100%;border-radius:8px;border:1px solid var(--border);display:block;margin-bottom:10px;background:#fff}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg)}
.option:hover{border-color:var(--accent);background:rgba(99,102,241,.08)}
.option.selected{border-color:var(--accent);background:rgba(99,102,241,.15)}
.option.correct{border-color:var(--green);background:rgba(34,197,94,.12)}
.option.incorrect{border-color:var(--red);background:rgba(239,68,68,.12)}
.option-letter{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;background:var(--card2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.incorrect .option-letter{background:var(--red);color:#fff}
.option-text{padding-top:4px;line-height:1.5}

/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.q-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex:1}
.q-dot{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.8rem;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.q-dot:hover{border-color:var(--accent)}
.q-dot.active{border-color:var(--accent);background:var(--accent);color:#fff}
.q-dot.answered{background:var(--accent);color:#fff;border-color:#fff}
.q-dot.flagged{border-color:var(--yellow);position:relative}
.q-dot.flagged::after{content:'';position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--yellow);border-radius:50%}
.flag-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--yellow);background:transparent;color:var(--yellow);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.flag-btn.flagged{background:rgba(234,179,8,.15)}

/* RESULTS */
#results-screen{display:none}
.results-header{text-align:center;padding:40px 0}
.score-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;border:6px solid}
.score-circle.pass{border-color:var(--green)}
.score-circle.fail{border-color:var(--red)}
.score-pct{font-size:2.5rem;font-weight:800}
.score-label{font-size:.9rem;color:var(--text2)}
.results-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:24px 0 40px}
.stat{background:var(--card);border-radius:10px;padding:16px;text-align:center}
.stat .num{font-size:1.5rem;font-weight:700}
.stat .lbl{font-size:.8rem;color:var(--text2);margin-top:2px}
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .15s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* REVIEW */
.review-card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;border-left:4px solid}
.review-card.rc-correct{border-left-color:var(--green)}
.review-card.rc-incorrect{border-left-color:var(--red)}
.review-card.rc-skipped{border-left-color:var(--yellow)}
.review-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-bottom:10px}
.badge-correct{background:rgba(34,197,94,.15);color:var(--green)}
.badge-incorrect{background:rgba(239,68,68,.15);color:var(--red)}
.badge-skipped{background:rgba(234,179,8,.15);color:var(--yellow)}
.review-q{font-weight:600;margin-bottom:12px;line-height:1.6;white-space:pre-line}
.review-options{margin-bottom:14px;font-size:.95rem}
.review-opt{padding:4px 0;display:flex;gap:8px}
.review-opt .marker{font-weight:700;min-width:20px}
.discussion{background:var(--bg);border-radius:10px;padding:16px;margin-top:12px;border:1px solid var(--border);font-size:.92rem;line-height:1.7;color:var(--text2)}
.discussion strong{color:var(--text)}
.discussion-title{font-weight:700;color:var(--accent2);margin-bottom:6px;font-size:.85rem}

@media(max-width:600px){
  #start-screen h1,#exam-select-screen h1{font-size:1.8rem}
  .question-card{padding:18px}
  .q-dot{width:30px;height:30px;font-size:.7rem}
  .timer{font-size:1.1rem}
}
</style>
</head>
<body>

<!-- EXAM SELECT SCREEN -->
<div id="exam-select-screen" class="container">
  <h1>ExamTopics Practice Simulator</h1>
  <p class="subtitle">Choose a certification to begin</p>
  <div class="exam-grid" id="exam-cards"></div>
</div>

<!-- START SCREEN -->
<div id="start-screen" class="container">
  <h1 id="exam-title"></h1>
  <p class="subtitle" id="exam-subtitle"></p>
  <div class="info-cards">
    <div class="info-card"><div class="label">Questions</div><div class="value" id="info-questions">-</div></div>
    <div class="info-card"><div class="label">Time Limit</div><div class="value" id="info-time">-</div></div>
    <div class="info-card"><div class="label">Topics</div><div class="value" id="info-topics">-</div></div>
    <div class="info-card"><div class="label">Passing</div><div class="value" id="info-passing">-</div></div>
  </div>
  <div class="qcount-row">
    <label for="qcount-select">Number of questions:</label>
    <select id="qcount-select" onchange="updateStartInfo()"></select>
  </div>
  <div style="margin-bottom:20px">
    <label style="color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="shuffle-check" checked> Shuffle question order
    </label>
  </div>
  <button class="btn btn-primary" onclick="startExam()">Start Exam</button>
  <div>
    <button class="btn-link" onclick="backToExamSelect()">&larr; Choose a different exam</button>
  </div>
</div>

<!-- EXAM SCREEN -->
<div id="exam-screen" class="container">
  <div class="exam-header">
    <div class="header-row">
      <span class="timer" id="timer">00:00:00</span>
      <span class="progress-info" id="progress-info">1 / 1</span>
      <div>
        <button class="btn btn-secondary btn-sm" onclick="submitExam()" style="margin-left:8px">Submit Exam</button>
      </div>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
  </div>
  <div id="question-area"></div>
  <div class="nav-row">
    <button class="btn btn-secondary btn-sm" id="prev-btn" onclick="navQ(-1)">&larr; Previous</button>
    <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">&#9873; Flag</button>
    <button class="btn btn-primary btn-sm" id="next-btn" onclick="navQ(1)">Next &rarr;</button>
  </div>
  <div class="q-nav" id="q-nav"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="container">
  <div class="results-header">
    <h2 style="margin-bottom:16px">Exam Results</h2>
    <div class="score-circle" id="score-circle"><div class="score-pct" id="score-pct"></div><div class="score-label" id="score-label"></div></div>
    <div class="results-stats" id="results-stats"></div>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div id="review-area"></div>
  <div style="text-align:center;padding:40px 0">
    <button class="btn btn-primary" onclick="location.reload()">Start Over</button>
  </div>
</div>

<script>
const GAIL_QUESTIONS = [
  {
    topic:1,num:1,
    q:"What is the definition of generative AI?",
    opts:["A type of predictive model that estimates a relationship by fitting a line to the observed data.","A type of artificial intelligence that can create new content and ideas, including text, images, music, and code.","A type of machine learning algorithm inspired by the human brain that is made up of interconnected nodes.","A type of artificial intelligence that enables a system to autonomously learn and improve using neural networks and deep learning."],
    ans:1,
    desc:"Generative AI refers to models and systems that are capable of generating new, original content based on patterns learned from existing data, rather than just analyzing or recognizing data. It can find complex relationships in large training datasets and then generalize what it learns to create new data like illustrations, blog drafts, answers to questions, text, images, video, music, code, and even chemical compound formulas."
  },
  {
    topic:1,num:2,
    q:"A company wants to use an AI agent to automate some tasks. They want everyone to understand the different functions of an AI agent. What is the function of an AI agent in the context of gen AI?",
    opts:["To provide the computational resources needed to train and run gen AI models.","To store and manage large datasets used for training and running gen AI models.","To provide a user-friendly interface for interacting with gen AI models.","To analyze situations, use multiple tools, and make informed decisions without requiring constant human input."],
    ans:3,
    desc:"An AI agent is an autonomous system that uses a large language model (LLM) as its brain to perform tasks. Its primary function is to perceive its environment, analyze the situation, make decisions, and take actions to achieve a specific goal. This involves leveraging various tools or capabilities and automating decision-making processes without needing constant human oversight."
  },
  {
    topic:1,num:3,
    q:"What is the definition of an AI agent?",
    opts:["An application that learns how to achieve a goal based on inputs and tools available to it.","A human expert who oversees and manages the operation of a gen AI application.","A type of user interface that allows users to interact with a gen AI application.","A static component of a gen AI application that provides information to the user."],
    ans:0,
    desc:"An AI agent is an application that perceives its environment, makes decisions, and takes actions to achieve specific goals — often using machine learning or other AI techniques. It's essentially a system that can \"think\" and \"do\" on its own, using inputs to understand the situation and a set of tools to perform tasks."
  },
  {
    topic:1,num:4,
    q:"A company is developing an AI character for a video game. The AI character needs to learn how to navigate a complex environment and make decisions to achieve certain objectives within the game. When the AI takes actions that lead to positive outcomes like finding a reward or overcoming an obstacle, it receives a positive score. When it takes actions that lead to negative outcomes, like hitting a wall or losing progress, it receives a negative score. Through this process of trial and error, the AI gradually improves the character's ability to play the game effectively. What machine learning should the company use?",
    opts:["Unsupervised learning","Reinforcement learning","Supervised learning","Deep learning"],
    ans:1,
    desc:"Reinforcement learning is the most suitable approach because it focuses on how an agent (the AI character) should take actions in an environment (the game world) to maximize a cumulative reward. The AI learns through trial and error, receiving positive rewards for desirable actions and negative rewards for undesirable ones. Key distinctions: A) Unsupervised Learning — No Labels, finds clusters of patterns; B) Reinforcement Learning — Trial and Error, gets rewarded for correct steps; C) Supervised Learning — Always has labels associated with the data; D) Deep Learning — Related to neural networking, another form of ML."
  },
  {
    topic:1,num:5,
    q:"A research team has collected a large dataset of sensor readings from various industrial machines. This dataset includes measurements like temperature, pressure vibration levels and electrical current recorded at regular intervals. The team has not yet assigned any labels or categories to these readings and wants to identify potential anomalies, malfunctions or natural groupings of machine behavior based on the sensor data alone. What type of machine learning should they use?",
    opts:["Deep learning","Reinforcement learning","Supervised learning","Unsupervised learning"],
    ans:3,
    desc:"Unsupervised learning is the correct choice because the data has no labels or categories assigned. Unsupervised learning algorithms can identify patterns, anomalies, and natural groupings in unlabeled data. The key indicators are: no labels have been assigned, and the goal is to identify potential anomalies, malfunctions, or natural groupings based on the sensor data alone."
  },
  {
    topic:1,num:6,
    q:"A highly regulated financial institution wants to use Gemini as the core decision engine for a loan approval system that will deterministically approve or reject loan applications based on a strict set of predefined criteria. Why is this an inappropriate use case for Gemini?",
    opts:["Gemini deployment for this scenario would be too expensive and complex.","Gemini's designed for flexible content generation and inference, not rigid rule-based decisions.","Gemini is not equipped to handle structured numerical data for financial assessments.","Gemini cannot integrate with required financial databases."],
    ans:1,
    desc:"Gemini is a Generative AI tool, not a discriminative AI tool. It operates through probabilistic reasoning, natural language understanding, and generative tasks. It is fit for tasks like summarization, question answering, and conversational AI — but it is not deterministic and not designed for strict rule-based decision-making."
  },
  {
    topic:1,num:7,
    q:"What is an example of unsupervised machine learning?",
    opts:["Predicting subscription renewal based on past renewal status data.","Training a system to recognize product images using labeled categories.","Analyzing customer purchase patterns to identify natural groupings.","Forecasting sales figures using historical sales and marketing spend."],
    ans:2,
    desc:"Analyzing customer purchase patterns to identify natural groupings (clustering) is a classic example of unsupervised machine learning. The key characteristics are: the data has no predefined labels, the system finds patterns or structures on its own, and common techniques include clustering and dimensionality reduction."
  },
  {
    topic:1,num:8,
    q:"A user asks a generative AI model about the scientific accuracy of a popular science fiction movie. The model confidently states that humans can indeed travel faster than light, referencing specific but entirely fictional theories and providing made-up explanations of how this is achieved according to the movie's \"established science.\" The model presents this information as factual, without indicating that it originates from a fictional work. What type of model limitation is this?",
    opts:["Bias","Hallucination","Knowledge cutoff","Data dependency"],
    ans:1,
    desc:"This is a classic example of hallucination in a generative AI model. A hallucination occurs when the model generates content that is factually incorrect, nonsensical, or entirely made up, yet presents it as verifiable truth. A) Bias — systematic preference or prejudice; B) Hallucination — the model makes up fake theories and presents fiction as real science; C) Knowledge cutoff — not about missing recent information; D) Data dependency — the problem is the model failing to separate fiction from reality."
  },
  {
    topic:1,num:9,
    q:"What does a diffusion model do?",
    opts:["Generates high-quality content by refining noise into structured data.","Facilitates the storage and management of structured data.","Analyzes data and predicts future trends and patterns.","Optimizes business processes and resource allocation."],
    ans:0,
    desc:"A diffusion model works by starting with random noise and progressively refining it into structured, high-quality content such as images, audio, or video. This process of iteratively denoising data is what makes diffusion models powerful for content generation tasks."
  },
  {
    topic:1,num:10,
    q:"An organization is collecting data to train a generative AI model for customer service. They want to ensure security throughout the ML lifecycle. What is a critical consideration at this stage?",
    opts:["Applying the latest software patches to the AI model on a regular basis.","Monitoring the AI model's performance for unexpected outputs and potential errors.","Establishing ethical guidelines for AI model responses to ensure fairness and avoid harm.","Implementing access controls and protecting sensitive information within the training data."],
    ans:3,
    desc:"At the data collection and training stage, the most critical security concern is protecting the training data itself. This includes: preventing unauthorized access to datasets, securing personally identifiable information (PII), applying data minimization and encryption, and ensuring compliance with privacy and security policies."
  },
  {
    topic:1,num:11,
    q:"A company trains a generative AI model designed to classify customer feedback as positive, negative, or neutral. However, the training dataset disproportionately includes feedback from a specific demographic and uses outdated language norms that don't reflect current customer communication styles. When the model is deployed, it shows a strong bias in its sentiment analysis for new customer feedback, misclassifying reviews from underrepresented demographics and struggling to understand current slang or phrasing. What type of model limitation is this?",
    opts:["Edge case","Data dependency","Hallucination","Overfitting"],
    ans:1,
    desc:"This is data dependency — a model's intelligence is a reflection of the data it consumed. This limitation manifests in two ways: Demographic Bias — the model depends on the training data to learn cultural nuances, and since the data was skewed toward one group, the model never learned the \"language\" of other demographics; Temporal Decay — the model depends on the data to stay current."
  },
  {
    topic:1,num:12,
    q:"A company wants to build a model to classify customer reviews as positive, negative, or neutral. They have collected a dataset of thousands of customer reviews, and each review has been manually tagged with the corresponding sentiment: positive, negative, or neutral. What machine learning should the company use?",
    opts:["Reinforcement learning","Deep learning","Unsupervised learning","Supervised learning"],
    ans:3,
    desc:"Supervised learning is the correct choice because the dataset has been manually labeled (tagged with positive, negative, or neutral). Supervised learning uses labeled training data to learn patterns and make predictions. The key indicator is the presence of manually assigned labels/categories in the training data."
  },
  {
    topic:1,num:13,
    q:"An order fulfillment team has an agent that automatically processes orders, updates inventory, sends shipping notifications, and handles returns. What type of agent is this?",
    opts:["A conversational agent","A customer service agent","An employee productivity agent","A workflow agent"],
    ans:3,
    desc:"A workflow agent is designed to automate an end-to-end operational process, acting as the \"glue\" between different functional areas. Key characteristics: multi-system integration (it doesn't just talk, it acts by updating databases and triggering external services), sequential logic (follows \"if this, then that\" chains), and operational focus (its goal is to complete a business transaction)."
  },
  {
    topic:2,num:1,
    q:"A company has a machine learning project that involves diverse data types like streaming data and structured databases. How does Google Cloud support data gathering for this project?",
    opts:["Google Cloud's strengths are in the data analysis tools such as BigQuery.","The Gemini app is the primary Google Cloud tool for directly collecting data.","Google Cloud relies on Vertex AI to connect to external data.","Google Cloud provides tools such as Pub/Sub, Cloud Storage, and Cloud SQL."],
    ans:3,
    desc:"The question specifically refers to streaming data and structured databases. Pub/Sub handles streaming data, Cloud SQL handles structured databases, and Cloud Storage provides general object storage. Together, Google Cloud provides a unified and scalable environment to gather, process, and prepare diverse data for machine learning."
  },
  {
    topic:2,num:2,
    q:"The office of the CISO wants to use generative AI (gen AI) to help automate tasks like summarizing case information, researching threats, and taking actions like creating detection rules. What agent should they use?",
    opts:["Data agent","Security agent","Customer service agent","Code agent"],
    ans:1,
    desc:"A Security agent is designed for cybersecurity and risk management tasks. It assists with threat detection, case summaries, and automating security actions. The other options: A) Data agent — helps collect, clean, and prepare data; C) Customer service agent — handles customer queries; D) Code agent — writes, reviews, and improves code."
  },
  {
    topic:2,num:3,
    q:"A financial services company receives a high volume of loan applications daily submitted as scanned documents and PDFs with varying layouts. The manual process of extracting key information is time-consuming and prone to errors. This causes delays in loan processing and impacts customer satisfaction. The company wants to automate the extraction of this critical data to improve efficiency and accuracy. Which Google Cloud tool should they use?",
    opts:["Document AI API","Natural Language API","Vision AI","Dataflow"],
    ans:0,
    desc:"Document AI API is the best fit because it extracts structured data from scanned documents and PDFs, even with varying layouts. It uses machine learning to understand and pull out key information like names, dates, and financial details."
  },
  {
    topic:2,num:4,
    q:"A security team needs a centralized platform to gain a comprehensive overview of their organization's security health across their entire Google Cloud environment, including potential threats to their generative AI deployments. Which Google Cloud security offering is specifically for this purpose?",
    opts:["Identity and Access Management","Workload monitoring tools","Security Command Center","Secure-Py-design infrastructure"],
    ans:2,
    desc:"Security Command Center (SCC) is Google Cloud's centralized vulnerability and threat reporting service. It provides comprehensive visibility and control over your cloud security posture, assets, and risks."
  },
  {
    topic:2,num:5,
    q:"An organization with a team of live customer service agents wants to improve agent efficiency and customer satisfaction during support interactions. They are looking for a tool that can provide real-time guidance to agents, suggest helpful information, and streamline the support process without fully automating customer conversations. Which component of Google's Customer Engagement Suite should they use?",
    opts:["Google Cloud Contact Center as a Service","Conversational Insights","Agent Assist","Conversational Agents"],
    ans:2,
    desc:"Agent Assist is designed to support live customer service agents by providing real-time guidance during conversations, suggesting relevant information and responses, and helping agents work faster and more accurately without replacing them."
  },

    topic:1,num:"219",
    q:"Company Overview -\nAltostrat is a prominent player in the media industry, with an extensive collection of audio and video content that comprises podcasts, interviews, news broadcasts, and documentaries. Their success in delivering premium content to a diverse audience requires a content management system that can keep pace with the dynamic media landscape.\nSolution Concept -\nAltostrat seeks to modernize its content management and user engagement strategies using Google Cloud's generative AI. They want a platform that empowers customers with personalized recommendations, natural language interactions and seamless self-service support. Simultaneously, they want to drive revenue growth through dynamic pricing targeted marketing, and personalized product suggestions.\nThe seamless integration of AI-powered tools into the existing Google Cloud environment will enable Altostrat to efficiently manage their vast media library, enhance user experiences, and unlock new revenue streams. Google Cloud's generative AI will solidify their leadership in the media industry.\nExisting Technical Environment -\nAltostrat\u2019s content management and delivery platform leverages GKE for scalability and high availability, essential for handling their vast media library. Their extensive media library spanning various documents, audio and video formats is stored in Cloud Storage. To gain valuable insights into user behavior, content consumption patterns, and audience demographics, Altostrat leverages BigQuery as their primary data warehouse. Additionally, they use Cloud Run functions for serverless execution of event-driven tasks such as video transcoding metadata extraction, and personalized content recommendations.\nWhile Altostrat has made significant strides in cloud adoption, they also maintain some legacy on-premises systems for specific workflows like content ingestion and archival. These systems are slated for modernization and migration to Google Cloud in the near future egy. By harnessing the power of generative AI, we will create an unparalleled user experience by empowering our audience with intelligent toots for content discovery, personalized recommendations, and seamless interaction. Reliability and cost management are our top priorities. This strategic initiative will deepen engagement, foster customer loyalty, and unlock new revenue streams through targeted marketing and tailored content offerings. We see a future where Al-driven innovation is central to our business, leading to greater success for our company and delivering exceptional value to our customers.\nFor this question, refer to the Altostrat Media case study. Altostrat stores a large library of media content, including sensitive interviews and documentaries, in Cloud Storage. They are concerned about the confidentiality of this content and want to protect it from unauthorized access. You need to implement a Google-recommended solution that is easy to integrate and provides Altostrat with control and auditability of the encryption keys. What should you do?",

. User management and authentication are currently handled through a combination of Google Identity and third-party identity providers. For monitoring and observability, Altostrat relies on a mix of native Google Cloud tools like Cloud Monitoring and open-source solutions like Prometheus, with alerts primarily delivered via email notifications.\nBusiness Requirements -\n\u2022\tAccelerate and enhance the reliability of operational workflows across all environments. [Google Cloud + On-premises]\n\u2022\tSimplify infrastructure management for rapid application deployment.\n\u2022\tOptimize cloud storage costs while maintaining high availability and scalability for media content.\n\u2022\tEnable natural language interaction with the platform with 24/7 user support.\n\u2022\tAutomatically generate concise summaries of media content.\n\u2022\tExtract rich metadata from media assets using NLP and computer vision.\n\u2022\tDetect and filter inappropriate content.\n\u2022\tAnalyze media content to identify trends and extract insights.\n\u2022\tInform content strategy and decision making with data.\nTechnical Requirements -\n\u2022\tModernize CI/CD for containerized deployments with a centralized management platform.\n\u2022\tSecure, high-performance hybrid cloud connectivity for data ingestion.\n\u2022\tProvide scalable, performant kubernetes environments both on-premises and in the cloud.\n\u2022\tOptimize cloud storage costs for growing media volumes.\n\u2022\tDesign AI-powered detection of harmful content.\n\u2022\tEnsure that AI systems are auditable and their decisions can be explained.\n\u2022\tLeverage LLMs and conversational AI for personalized experiences and content virality.\n\u2022\tDevelop advanced chatbots with natural language understanding to provide personalized assistance.\n\u2022\tAutomated summarization for diverse media.\nExecutive Statement -\nAt Altostrat, we are embracing the next frontier of artificial intelligence to revolutionize our content strategy. By harnessing the power of generative AI, we will create an unparalleled user experience by empowering our audience with intelligent toots for content discovery, personalized recommendations, and seamless interaction. Reliability and cost management are our top priorities. This strategic initiative will deepen engagement, foster customer loyalty, and unlock new revenue streams through targeted marketing and tailored content offerings. We see a future where Al-driven innovation is central to our business, leading to greater success for our company and delivering exceptional value to our customers.\nFor this question, refer to the Altostrat Media case study. Altostrat's development team is using a microservices architecture for their application. You need to select the most suitable testing approach to ensure that individual microservices function correctly in isolation. What should you do?",
    opts:["Run unit testing.", "Use load testing.", "Perform end-to-end testing.", "Execute integration testing"],

    topic:1,num:"225",
    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling \u201cautomotive experience.\u201d Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n\u2022\tModernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n\u2022\tNetwork upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n\u2022\tIT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n\u2022\tAutonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n\u2022\tData monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n\u2022\tIncreased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n\u2022\tProviding a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data \u2014 encompassing driving, road conditions, behavioral studies, and crash safety statistics \u2014 to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives has developed a new car configurator application to enhance both the dealer and customer experience. The new application will be deployed on Google Kubernetes Engine (GKE) KnightMotives wants you to replicate the deployment of the application across multiple locations to ensure this critical application is always available over the internet, even during regional outages. What should you do?",
    opts:["Create multiple GKE clusters in different regions. Deploy part of the microservices of the app in different clusters. Configure a multi-cluster Cloud Service Mesh.", "Create multiple GKE clusters in different regions. Deploy the app on every cluster. Configure a multi-cluster Cloud Service Mesh.", "Create a fleet of GKE clusters in different regions Deploy part of the microservices of the app in different clusters Configure a multi-cluster Gateway.", "Create a fleet of GKE clusters in different regions. Deploy the app on every cluster. Configure a multi-cluster Gateway."],
    ans:[3],
    desc:"See community discussion on ExamTopics for detailed explanation."
  },

 leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n\u2022\tAutonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n\u2022\tData monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n\u2022\tIncreased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n\u2022\tProviding a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data \u2014 encompassing driving, road conditions, behavioral studies, and crash safety statistics \u2014 to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study, KnightMotives has deployed their new Dealer Tools on Google Kubernetes Engine (GKE). You are supporting KnightMotives in the performance of the GKE workloads. Some of the Pods are Statefull. To ensure these Pods do not consume an unlimited amount of CPU, you have configured resource limits on the Deployments. You have identified that these Pods were allocated too much CPU and are actually consuming drastically less some of the time. You want to optimize resource usage and allow maximum flexibility in case of higher load. What should you do?",
    opts:["Configure resource requests per Deployment. Set resource requests slightly above the typical CPU usage observed during monitoring.", "Configure resource requests per Deployment. Ensure the requests are equal to the current limits.", "Enable vertical Pod autoscaling on each Deployment. Ensure the autoscaling mode is set to Auto.", "Enable horizontal Pod autoscaling on each Deployment. Ensure the minimum number of Pods is lower than the currently configured amount in the Deployment."],

    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling \u201cautomotive experience.\u201d Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n\u2022\tModernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n\u2022\tNetwork upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n\u2022\tIT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n\u2022\tAutonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n\u2022\tData monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n\u2022\tIncreased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n\u2022\tProviding a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data \u2014 encompassing driving, road conditions, behavioral studies, and crash safety statistics \u2014 to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives has developed and deployed a model on Vertex AI that can provide personalized recommendations in the new car configuration application. Customers will receive optional equipment recommendations that best suit their persona. Previous usage data from the car configuration application has been used for model training features. You know from past experience that customer behavior can change over time. For example, in times of economic certainty and rising stock markets, customers tend to purchase more expensive options. You want to detect when customer behavior gradually changes over time so you can adjust the model. What should you do?",

];const EXAMS = {
  gail: {
    id:'gail',
    title:'Google Generative AI Leader',
    shortTitle:'GAIL',
    subtitle:'GAIL Exam Simulator — ExamTopics Practice',
    paceMinPerQ: 90/56,
    passPct: 70,
    defaultCount: null,
    topicNames: {1:"Fundamentals of Gen AI",2:"Google Cloud AI Tools & Services",3:"Prompting, RAG & Model Configuration",4:"AI Strategy & Responsible AI"},
    questions: GAIL_QUESTIONS
  },
  pca: {
    id:'pca',
    title:'Google Professional Cloud Architect',
    shortTitle:'PCA',
    subtitle:'PCA Exam Simulator — ExamTopics Practice',
    paceMinPerQ: 120/50,
    passPct: 70,
    defaultCount: 50,
    topicNames: {},
    questions: PCA_QUESTIONS
  }
};

const LETTERS = ['A','B','C','D','E','F','G','H'];

let currentExam = null;
let order = [];
let current = 0;
let answers = {};
let flags = new Set();
let examTime = 0;
let timeLeft = 0;
let timerInterval = null;
let examDone = false;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function normAns(q){ return Array.isArray(q.ans) ? q.ans : [q.ans]; }

function topicLabel(q){
  const name = currentExam.topicNames[q.topic];
  return name ? `Topic ${q.topic}: ${name}` : `Topic ${q.topic}`;
}

function questionImages(q){
  if(!q.images || !q.images.length) return '';
  return `<div class="q-images">${q.images.map(src=>`<img src="${esc(src)}" alt="Exhibit" loading="lazy">`).join('')}</div>`;
}

function buildExamCards(){
  const wrap = document.getElementById('exam-cards');
  wrap.innerHTML = '';
  Object.values(EXAMS).forEach(exam=>{
    const topics = new Set(exam.questions.map(q=>q.topic)).size;
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = `
      <div class="exam-card-title">${esc(exam.title)}</div>
      <div class="exam-card-sub">${esc(exam.shortTitle)}</div>
      <div class="exam-card-stats"><span>${exam.questions.length} Questions</span><span>${topics} Topics</span></div>
    `;
    card.onclick = ()=>selectExam(exam.id);
    wrap.appendChild(card);
  });
}

function selectExam(id){
  currentExam = EXAMS[id];
  document.getElementById('exam-select-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('exam-title').textContent = currentExam.title;
  document.getElementById('exam-subtitle').textContent = currentExam.subtitle;

  const total = currentExam.questions.length;
  const topics = new Set(currentExam.questions.map(q=>q.topic)).size;
  document.getElementById('info-topics').textContent = topics;
  document.getElementById('info-passing').textContent = currentExam.passPct + '%';

  const qSel = document.getElementById('qcount-select');
  qSel.innerHTML = '';
  [10,25,50,100,200].filter(n=>n<total).forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n+' Questions';
    if(currentExam.defaultCount === n) opt.selected = true;
    qSel.appendChild(opt);
  });
  const allOpt = document.createElement('option');
  allOpt.value = total; allOpt.textContent = `All (${total})`;
  if(!currentExam.defaultCount) allOpt.selected = true;
  qSel.appendChild(allOpt);

  updateStartInfo();
}

function updateStartInfo(){
  const numQ = parseInt(document.getElementById('qcount-select').value, 10);
  document.getElementById('info-questions').textContent = numQ;
  const mins = Math.max(5, Math.round(numQ * currentExam.paceMinPerQ));
  const h = Math.floor(mins/60), m = mins%60;
  document.getElementById('info-time').textContent = h>0 ? `${h}h ${m}m` : `${m}m`;
}

function backToExamSelect(){
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-select-screen').style.display = 'block';
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startExam() {
  const doShuffle = document.getElementById('shuffle-check').checked;
  const total = currentExam.questions.length;
  const numQ = Math.min(total, parseInt(document.getElementById('qcount-select').value, 10));
  let indices = [...Array(total).keys()];
  if(doShuffle) indices = shuffle(indices);
  order = indices.slice(0, numQ);
  answers = {};
  flags = new Set();
  current = 0;
  examTime = Math.max(300, Math.round(numQ * currentExam.paceMinPerQ * 60));
  timeLeft = examTime;
  examDone = false;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  buildNav();
  renderQuestion();
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  if(timeLeft <= 0) { timeLeft = 0; submitExam(); return; }
  const h = Math.floor(timeLeft/3600);
  const m = Math.floor((timeLeft%3600)/60);
  const s = timeLeft%60;
  const el = document.getElementById('timer');
  el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer' + (timeLeft < 300 ? ' danger' : timeLeft < 600 ? ' warning' : '');
}

function isAnswered(qi){ return !!(answers[qi] && answers[qi].length>0); }

function buildNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  for(let i=0;i<order.length;i++){
    const d = document.createElement('div');
    d.className = 'q-dot' + (i===current?' active':'') + (isAnswered(order[i])?' answered':'') + (flags.has(order[i])?' flagged':'');
    d.textContent = i+1;
    d.onclick = ()=>{current=i;renderQuestion();updateNav();};
    nav.appendChild(d);
  }
}
function updateNav(){
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((d,i)=>{
    d.className='q-dot'+(i===current?' active':'')+(isAnswered(order[i])?' answered':'')+(flags.has(order[i])?' flagged':'');
  });
  document.getElementById('progress-info').textContent = `${current+1} / ${order.length}`;
  document.getElementById('progress-bar').style.width = `${((current+1)/order.length)*100}%`;
  const fb = document.getElementById('flag-btn');
  fb.className = 'flag-btn'+(flags.has(order[current])?' flagged':'');
}

function renderQuestion(){
  const qi = order[current];
  const q = currentExam.questions[qi];
  const ansArr = normAns(q);
  const multi = ansArr.length > 1;
  const userSel = answers[qi] || [];
  const area = document.getElementById('question-area');
  let html = `<div class="question-card">
    <div class="q-topic">${esc(topicLabel(q))}</div>
    <div class="q-number">Question ${current+1} of ${order.length} (T${q.topic} Q${q.num})${multi?` <span class="multi-hint">Select ${ansArr.length} answers</span>`:''}</div>
    <div class="q-text">${esc(q.q)}</div>
    ${questionImages(q)}
    <div class="options">`;
  q.opts.forEach((o,oi)=>{
    const sel = userSel.includes(oi) ? ' selected':'';
    html += `<div class="option${sel}" onclick="selectOpt(${qi},${oi})">
      <div class="option-letter">${LETTERS[oi]}</div>
      <div class="option-text">${esc(o)}</div>
    </div>`;
  });
  html += `</div></div>`;
  area.innerHTML = html;
  updateNav();
}

function selectOpt(qi,oi){
  if(examDone) return;
  const q = currentExam.questions[qi];
  const ansArr = normAns(q);
  const multi = ansArr.length > 1;
  if(!answers[qi]) answers[qi] = [];
  if(multi){
    const idx = answers[qi].indexOf(oi);
    if(idx>=0) answers[qi].splice(idx,1);
    else answers[qi].push(oi);
  } else {
    answers[qi] = [oi];
  }
  renderQuestion();
}

function navQ(d){
  current = Math.max(0,Math.min(order.length-1,current+d));
  renderQuestion();
}

function toggleFlag(){
  const qi = order[current];
  if(flags.has(qi)) flags.delete(qi); else flags.add(qi);
  updateNav();
}

function submitExam(){
  const answeredCount = order.filter(qi=>isAnswered(qi)).length;
  const unanswered = order.length - answeredCount;
  if(unanswered > 0 && timeLeft > 0){
    if(!confirm(`You have ${unanswered} unanswered question(s). Are you sure you want to submit?`)) return;
  }
  clearInterval(timerInterval);
  examDone = true;
  showResults();
}

function isCorrect(q, userArr){
  const ansArr = normAns(q);
  if(!userArr || userArr.length===0) return false;
  const a = [...userArr].sort((x,y)=>x-y).join(',');
  const b = [...ansArr].sort((x,y)=>x-y).join(',');
  return a===b;
}

function showResults(){
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  let correct=0, incorrect=0, skipped=0;
  const results = order.map((qi)=>{
    const q = currentExam.questions[qi];
    const userAns = answers[qi] || [];
    if(userAns.length===0){skipped++;return{q,status:'skipped',userAns:[]};}
    if(isCorrect(q,userAns)){correct++;return{q,status:'correct',userAns};}
    incorrect++;return{q,status:'incorrect',userAns};
  });
  const pct = Math.round((correct/order.length)*100);
  const pass = pct >= currentExam.passPct;
  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle '+(pass?'pass':'fail');
  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-pct').style.color = pass?'var(--green)':'var(--red)';
  document.getElementById('score-label').textContent = pass?'PASSED':'FAILED';

  const timeTaken = examTime - timeLeft;
  const tm = Math.floor(timeTaken/60);
  const ts = timeTaken%60;

  document.getElementById('results-stats').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--green)">${correct}</div><div class="lbl">Correct</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${incorrect}</div><div class="lbl">Incorrect</div></div>
    <div class="stat"><div class="num" style="color:var(--yellow)">${skipped}</div><div class="lbl">Skipped</div></div>
    <div class="stat"><div class="num">${correct}/${order.length}</div><div class="lbl">Score</div></div>
    <div class="stat"><div class="num">${tm}m ${ts}s</div><div class="lbl">Time Taken</div></div>
  `;

  document.getElementById('filter-row').innerHTML = `
    <button class="filter-btn active" onclick="filterReview('all',this)">All (${order.length})</button>
    <button class="filter-btn" onclick="filterReview('incorrect',this)">Incorrect (${incorrect})</button>
    <button class="filter-btn" onclick="filterReview('correct',this)">Correct (${correct})</button>
    <button class="filter-btn" onclick="filterReview('skipped',this)">Skipped (${skipped})</button>
  `;

  window._results = results;
  renderReview('all');
  window.scrollTo(0,0);
}

function filterReview(type, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderReview(type);
}

function renderReview(filter){
  const area = document.getElementById('review-area');
  let html = '';
  window._results.forEach((r)=>{
    if(filter!=='all' && r.status!==filter) return;
    const q = r.q;
    const ansArr = normAns(q);
    const badgeClass = r.status==='correct'?'badge-correct':r.status==='incorrect'?'badge-incorrect':'badge-skipped';
    const cardClass = 'rc-'+r.status;
    html += `<div class="review-card ${cardClass}">
      <span class="review-badge ${badgeClass}">${r.status}</span>
      <div class="q-topic" style="margin-bottom:6px">${esc(topicLabel(q))} — Q${q.num}</div>
      <div class="review-q">${esc(q.q)}</div>
      ${questionImages(q)}
      <div class="review-options">`;
    q.opts.forEach((o,oi)=>{
      let icon = '';
      let style = '';
      const isAns = ansArr.includes(oi);
      const wasPicked = r.userAns.includes(oi);
      if(isAns){icon='✓';style='color:var(--green);font-weight:700'}
      if(wasPicked && !isAns){icon='✗';style='color:var(--red);font-weight:700'}
      html += `<div class="review-opt" style="${style}"><span class="marker">${LETTERS[oi]}.</span> ${esc(o)} ${icon?'<strong>'+icon+'</strong>':''}</div>`;
    });
    html += `</div>`;
    if(r.userAns.length>0 && r.status!=='correct'){
      html += `<div style="color:var(--red);font-size:.9rem;margin-bottom:4px"><strong>Your answer:</strong> ${r.userAns.map(i=>LETTERS[i]).join(', ')}</div>`;
    }
    html += `<div style="color:var(--green);font-size:.9rem;margin-bottom:8px"><strong>Correct answer:</strong> ${ansArr.map(i=>LETTERS[i]).join(', ')}</div>`;
    html += `<div class="discussion"><div class="discussion-title">📖 Discussion / Explanation</div>${esc(q.desc)}</div>`;
    html += `</div>`;
  });
  area.innerHTML = html;
}

document.addEventListener('keydown',e=>{
  if(examDone || !currentExam || document.getElementById('exam-screen').style.display==='none') return;
  if(e.key==='ArrowRight'||e.key==='n') navQ(1);
  if(e.key==='ArrowLeft'||e.key==='p') navQ(-1);
  if(/^[1-8]$/.test(e.key)) selectOpt(order[current], parseInt(e.key,10)-1);
  if(e.key==='a') selectOpt(order[current],0);
  if(e.key==='b') selectOpt(order[current],1);
  if(e.key==='c') selectOpt(order[current],2);
  if(e.key==='d') selectOpt(order[current],3);
  if(e.key==='f') toggleFlag();
});

buildExamCards();
</script>
</body>
</html>
