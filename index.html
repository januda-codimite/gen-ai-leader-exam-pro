<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamTopics Exam Simulator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--text2:#94a3b8;--border:#475569}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}

/* START SCREEN */
#exam-select-screen{text-align:center;padding:80px 20px}
#start-screen{display:none;text-align:center;padding:80px 20px}
#start-screen h1,#exam-select-screen h1{font-size:2.5rem;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#start-screen .subtitle,#exam-select-screen .subtitle{color:var(--text2);font-size:1.1rem;margin-bottom:40px}
.info-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px;text-align:left}
.info-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.info-card .label{color:var(--text2);font-size:.85rem;margin-bottom:4px}
.info-card .value{font-size:1.3rem;font-weight:700}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:20px;text-align:left}
.exam-card{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.exam-card:hover{border-color:var(--accent);transform:translateY(-2px);background:rgba(99,102,241,.08)}
.exam-card .exam-card-title{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.exam-card .exam-card-sub{color:var(--accent2);font-size:.85rem;font-weight:600;margin-bottom:16px}
.exam-card .exam-card-stats{display:flex;gap:16px;color:var(--text2);font-size:.85rem}
.qcount-row{margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.qcount-row label{color:var(--text2)}
select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.95rem;cursor:pointer}
.btn{display:inline-block;padding:14px 40px;border-radius:10px;border:none;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:8px 20px;font-size:.9rem}
.btn-link{background:none;border:none;color:var(--text2);text-decoration:underline;cursor:pointer;font-size:.9rem;margin-top:16px}
.btn-link:hover{color:var(--text)}

/* EXAM HEADER */
#exam-screen{display:none}
.exam-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 0;margin-bottom:24px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.timer{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warning{color:var(--yellow)}
.timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-info{color:var(--text2);font-size:.9rem}
.progress-bar-bg{width:100%;height:6px;background:var(--card2);border-radius:99px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}

/* QUESTION CARD */
.question-card{background:var(--card);border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid var(--border)}
.q-topic{color:var(--accent2);font-size:.85rem;font-weight:600;margin-bottom:8px}
.q-number{font-size:1rem;color:var(--text2);margin-bottom:12px}
.multi-hint{color:var(--yellow);font-weight:600;font-size:.8rem;border:1px solid var(--yellow);border-radius:20px;padding:2px 10px;margin-left:6px}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:24px;white-space:pre-line}
.q-images{margin-bottom:24px}
.q-images img{max-width:100%;border-radius:8px;border:1px solid var(--border);display:block;margin-bottom:10px;background:#fff}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg)}
.option:hover{border-color:var(--accent);background:rgba(99,102,241,.08)}
.option.selected{border-color:var(--accent);background:rgba(99,102,241,.15)}
.option.correct{border-color:var(--green);background:rgba(34,197,94,.12)}
.option.incorrect{border-color:var(--red);background:rgba(239,68,68,.12)}
.option-letter{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;background:var(--card2);flex-shrink:0}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.incorrect .option-letter{background:var(--red);color:#fff}
.option-text{padding-top:4px;line-height:1.5}

/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.q-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex:1}
.q-dot{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.8rem;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.q-dot:hover{border-color:var(--accent)}
.q-dot.active{border-color:var(--accent);background:var(--accent);color:#fff}
.q-dot.answered{background:var(--accent);color:#fff;border-color:#fff}
.q-dot.flagged{border-color:var(--yellow);position:relative}
.q-dot.flagged::after{content:'';position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--yellow);border-radius:50%}
.flag-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--yellow);background:transparent;color:var(--yellow);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.flag-btn.flagged{background:rgba(234,179,8,.15)}

/* RESULTS */
#results-screen{display:none}
.results-header{text-align:center;padding:40px 0}
.score-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;border:6px solid}
.score-circle.pass{border-color:var(--green)}
.score-circle.fail{border-color:var(--red)}
.score-pct{font-size:2.5rem;font-weight:800}
.score-label{font-size:.9rem;color:var(--text2)}
.results-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:24px 0 40px}
.stat{background:var(--card);border-radius:10px;padding:16px;text-align:center}
.stat .num{font-size:1.5rem;font-weight:700}
.stat .lbl{font-size:.8rem;color:var(--text2);margin-top:2px}
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .15s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* REVIEW */
.review-card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;border-left:4px solid}
.review-card.rc-correct{border-left-color:var(--green)}
.review-card.rc-incorrect{border-left-color:var(--red)}
.review-card.rc-skipped{border-left-color:var(--yellow)}
.review-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-bottom:10px}
.badge-correct{background:rgba(34,197,94,.15);color:var(--green)}
.badge-incorrect{background:rgba(239,68,68,.15);color:var(--red)}
.badge-skipped{background:rgba(234,179,8,.15);color:var(--yellow)}
.review-q{font-weight:600;margin-bottom:12px;line-height:1.6;white-space:pre-line}
.review-options{margin-bottom:14px;font-size:.95rem}
.review-opt{padding:4px 0;display:flex;gap:8px}
.review-opt .marker{font-weight:700;min-width:20px}
.discussion{background:var(--bg);border-radius:10px;padding:16px;margin-top:12px;border:1px solid var(--border);font-size:.92rem;line-height:1.7;color:var(--text2)}
.discussion strong{color:var(--text)}
.discussion-title{font-weight:700;color:var(--accent2);margin-bottom:6px;font-size:.85rem}

@media(max-width:600px){
  #start-screen h1,#exam-select-screen h1{font-size:1.8rem}
  .question-card{padding:18px}
  .q-dot{width:30px;height:30px;font-size:.7rem}
  .timer{font-size:1.1rem}
}
</style>
</head>
<body>

<!-- EXAM SELECT SCREEN -->
<div id="exam-select-screen" class="container">
  <h1>ExamTopics Practice Simulator</h1>
  <p class="subtitle">Choose a certification to begin</p>
  <div class="exam-grid" id="exam-cards"></div>
</div>

<!-- START SCREEN -->
<div id="start-screen" class="container">
  <h1 id="exam-title"></h1>
  <p class="subtitle" id="exam-subtitle"></p>
  <div class="info-cards">
    <div class="info-card"><div class="label">Questions</div><div class="value" id="info-questions">-</div></div>
    <div class="info-card"><div class="label">Time Limit</div><div class="value" id="info-time">-</div></div>
    <div class="info-card"><div class="label">Topics</div><div class="value" id="info-topics">-</div></div>
    <div class="info-card"><div class="label">Passing</div><div class="value" id="info-passing">-</div></div>
  </div>
  <div class="qcount-row">
    <label for="qcount-select">Number of questions:</label>
    <select id="qcount-select" onchange="updateStartInfo()"></select>
  </div>
  <div style="margin-bottom:20px">
    <label style="color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="shuffle-check" checked> Shuffle question order
    </label>
  </div>
  <button class="btn btn-primary" onclick="startExam()">Start Exam</button>
  <div>
    <button class="btn-link" onclick="backToExamSelect()">&larr; Choose a different exam</button>
  </div>
</div>

<!-- EXAM SCREEN -->
<div id="exam-screen" class="container">
  <div class="exam-header">
    <div class="header-row">
      <span class="timer" id="timer">00:00:00</span>
      <span class="progress-info" id="progress-info">1 / 1</span>
      <div>
        <button class="btn btn-secondary btn-sm" onclick="submitExam()" style="margin-left:8px">Submit Exam</button>
      </div>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
  </div>
  <div id="question-area"></div>
  <div class="nav-row">
    <button class="btn btn-secondary btn-sm" id="prev-btn" onclick="navQ(-1)">&larr; Previous</button>
    <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">&#9873; Flag</button>
    <button class="btn btn-primary btn-sm" id="next-btn" onclick="navQ(1)">Next &rarr;</button>
  </div>
  <div class="q-nav" id="q-nav"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="container">
  <div class="results-header">
    <h2 style="margin-bottom:16px">Exam Results</h2>
    <div class="score-circle" id="score-circle"><div class="score-pct" id="score-pct"></div><div class="score-label" id="score-label"></div></div>
    <div class="results-stats" id="results-stats"></div>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div id="review-area"></div>
  <div style="text-align:center;padding:40px 0">
    <button class="btn btn-primary" onclick="location.reload()">Start Over</button>
  </div>
</div>

<script>
const GAIL_QUESTIONS = [
  {
    topic:1,num:1,
    q:"What is the definition of generative AI?",
    opts:["A type of predictive model that estimates a relationship by fitting a line to the observed data.","A type of artificial intelligence that can create new content and ideas, including text, images, music, and code.","A type of machine learning algorithm inspired by the human brain that is made up of interconnected nodes.","A type of artificial intelligence that enables a system to autonomously learn and improve using neural networks and deep learning."],
    ans:1,
    desc:"Generative AI refers to models and systems that are capable of generating new, original content based on patterns learned from existing data, rather than just analyzing or recognizing data. It can find complex relationships in large training datasets and then generalize what it learns to create new data like illustrations, blog drafts, answers to questions, text, images, video, music, code, and even chemical compound formulas."
  },
  {
    topic:1,num:2,
    q:"A company wants to use an AI agent to automate some tasks. They want everyone to understand the different functions of an AI agent. What is the function of an AI agent in the context of gen AI?",
    opts:["To provide the computational resources needed to train and run gen AI models.","To store and manage large datasets used for training and running gen AI models.","To provide a user-friendly interface for interacting with gen AI models.","To analyze situations, use multiple tools, and make informed decisions without requiring constant human input."],
    ans:3,
    desc:"An AI agent is an autonomous system that uses a large language model (LLM) as its brain to perform tasks. Its primary function is to perceive its environment, analyze the situation, make decisions, and take actions to achieve a specific goal. This involves leveraging various tools or capabilities and automating decision-making processes without needing constant human oversight."
  },
  {
    topic:1,num:3,
    q:"What is the definition of an AI agent?",
    opts:["An application that learns how to achieve a goal based on inputs and tools available to it.","A human expert who oversees and manages the operation of a gen AI application.","A type of user interface that allows users to interact with a gen AI application.","A static component of a gen AI application that provides information to the user."],
    ans:0,
    desc:"An AI agent is an application that perceives its environment, makes decisions, and takes actions to achieve specific goals — often using machine learning or other AI techniques. It's essentially a system that can \"think\" and \"do\" on its own, using inputs to understand the situation and a set of tools to perform tasks."
  },
  {
    topic:1,num:4,
    q:"A company is developing an AI character for a video game. The AI character needs to learn how to navigate a complex environment and make decisions to achieve certain objectives within the game. When the AI takes actions that lead to positive outcomes like finding a reward or overcoming an obstacle, it receives a positive score. When it takes actions that lead to negative outcomes, like hitting a wall or losing progress, it receives a negative score. Through this process of trial and error, the AI gradually improves the character's ability to play the game effectively. What machine learning should the company use?",
    opts:["Unsupervised learning","Reinforcement learning","Supervised learning","Deep learning"],
    ans:1,
    desc:"Reinforcement learning is the most suitable approach because it focuses on how an agent (the AI character) should take actions in an environment (the game world) to maximize a cumulative reward. The AI learns through trial and error, receiving positive rewards for desirable actions and negative rewards for undesirable ones. Key distinctions: A) Unsupervised Learning — No Labels, finds clusters of patterns; B) Reinforcement Learning — Trial and Error, gets rewarded for correct steps; C) Supervised Learning — Always has labels associated with the data; D) Deep Learning — Related to neural networking, another form of ML."
  },
  {
    topic:1,num:5,
    q:"A research team has collected a large dataset of sensor readings from various industrial machines. This dataset includes measurements like temperature, pressure vibration levels and electrical current recorded at regular intervals. The team has not yet assigned any labels or categories to these readings and wants to identify potential anomalies, malfunctions or natural groupings of machine behavior based on the sensor data alone. What type of machine learning should they use?",
    opts:["Deep learning","Reinforcement learning","Supervised learning","Unsupervised learning"],
    ans:3,
    desc:"Unsupervised learning is the correct choice because the data has no labels or categories assigned. Unsupervised learning algorithms can identify patterns, anomalies, and natural groupings in unlabeled data. The key indicators are: no labels have been assigned, and the goal is to identify potential anomalies, malfunctions, or natural groupings based on the sensor data alone."
  },
  {
    topic:1,num:6,
    q:"A highly regulated financial institution wants to use Gemini as the core decision engine for a loan approval system that will deterministically approve or reject loan applications based on a strict set of predefined criteria. Why is this an inappropriate use case for Gemini?",
    opts:["Gemini deployment for this scenario would be too expensive and complex.","Gemini's designed for flexible content generation and inference, not rigid rule-based decisions.","Gemini is not equipped to handle structured numerical data for financial assessments.","Gemini cannot integrate with required financial databases."],
    ans:1,
    desc:"Gemini is a Generative AI tool, not a discriminative AI tool. It operates through probabilistic reasoning, natural language understanding, and generative tasks. It is fit for tasks like summarization, question answering, and conversational AI — but it is not deterministic and not designed for strict rule-based decision-making."
  },
  {
    topic:1,num:7,
    q:"What is an example of unsupervised machine learning?",
    opts:["Predicting subscription renewal based on past renewal status data.","Training a system to recognize product images using labeled categories.","Analyzing customer purchase patterns to identify natural groupings.","Forecasting sales figures using historical sales and marketing spend."],
    ans:2,
    desc:"Analyzing customer purchase patterns to identify natural groupings (clustering) is a classic example of unsupervised machine learning. The key characteristics are: the data has no predefined labels, the system finds patterns or structures on its own, and common techniques include clustering and dimensionality reduction."
  },
  {
    topic:1,num:8,
    q:"A user asks a generative AI model about the scientific accuracy of a popular science fiction movie. The model confidently states that humans can indeed travel faster than light, referencing specific but entirely fictional theories and providing made-up explanations of how this is achieved according to the movie's \"established science.\" The model presents this information as factual, without indicating that it originates from a fictional work. What type of model limitation is this?",
    opts:["Bias","Hallucination","Knowledge cutoff","Data dependency"],
    ans:1,
    desc:"This is a classic example of hallucination in a generative AI model. A hallucination occurs when the model generates content that is factually incorrect, nonsensical, or entirely made up, yet presents it as verifiable truth. A) Bias — systematic preference or prejudice; B) Hallucination — the model makes up fake theories and presents fiction as real science; C) Knowledge cutoff — not about missing recent information; D) Data dependency — the problem is the model failing to separate fiction from reality."
  },
  {
    topic:1,num:9,
    q:"What does a diffusion model do?",
    opts:["Generates high-quality content by refining noise into structured data.","Facilitates the storage and management of structured data.","Analyzes data and predicts future trends and patterns.","Optimizes business processes and resource allocation."],
    ans:0,
    desc:"A diffusion model works by starting with random noise and progressively refining it into structured, high-quality content such as images, audio, or video. This process of iteratively denoising data is what makes diffusion models powerful for content generation tasks."
  },
  {
    topic:1,num:10,
    q:"An organization is collecting data to train a generative AI model for customer service. They want to ensure security throughout the ML lifecycle. What is a critical consideration at this stage?",
    opts:["Applying the latest software patches to the AI model on a regular basis.","Monitoring the AI model's performance for unexpected outputs and potential errors.","Establishing ethical guidelines for AI model responses to ensure fairness and avoid harm.","Implementing access controls and protecting sensitive information within the training data."],
    ans:3,
    desc:"At the data collection and training stage, the most critical security concern is protecting the training data itself. This includes: preventing unauthorized access to datasets, securing personally identifiable information (PII), applying data minimization and encryption, and ensuring compliance with privacy and security policies."
  },
  {
    topic:1,num:11,
    q:"A company trains a generative AI model designed to classify customer feedback as positive, negative, or neutral. However, the training dataset disproportionately includes feedback from a specific demographic and uses outdated language norms that don't reflect current customer communication styles. When the model is deployed, it shows a strong bias in its sentiment analysis for new customer feedback, misclassifying reviews from underrepresented demographics and struggling to understand current slang or phrasing. What type of model limitation is this?",
    opts:["Edge case","Data dependency","Hallucination","Overfitting"],
    ans:1,
    desc:"This is data dependency — a model's intelligence is a reflection of the data it consumed. This limitation manifests in two ways: Demographic Bias — the model depends on the training data to learn cultural nuances, and since the data was skewed toward one group, the model never learned the \"language\" of other demographics; Temporal Decay — the model depends on the data to stay current."
  },
  {
    topic:1,num:12,
    q:"A company wants to build a model to classify customer reviews as positive, negative, or neutral. They have collected a dataset of thousands of customer reviews, and each review has been manually tagged with the corresponding sentiment: positive, negative, or neutral. What machine learning should the company use?",
    opts:["Reinforcement learning","Deep learning","Unsupervised learning","Supervised learning"],
    ans:3,
    desc:"Supervised learning is the correct choice because the dataset has been manually labeled (tagged with positive, negative, or neutral). Supervised learning uses labeled training data to learn patterns and make predictions. The key indicator is the presence of manually assigned labels/categories in the training data."
  },
  {
    topic:1,num:13,
    q:"An order fulfillment team has an agent that automatically processes orders, updates inventory, sends shipping notifications, and handles returns. What type of agent is this?",
    opts:["A conversational agent","A customer service agent","An employee productivity agent","A workflow agent"],
    ans:3,
    desc:"A workflow agent is designed to automate an end-to-end operational process, acting as the \"glue\" between different functional areas. Key characteristics: multi-system integration (it doesn't just talk, it acts by updating databases and triggering external services), sequential logic (follows \"if this, then that\" chains), and operational focus (its goal is to complete a business transaction)."
  },
  {
    topic:2,num:1,
    q:"A company has a machine learning project that involves diverse data types like streaming data and structured databases. How does Google Cloud support data gathering for this project?",
    opts:["Google Cloud's strengths are in the data analysis tools such as BigQuery.","The Gemini app is the primary Google Cloud tool for directly collecting data.","Google Cloud relies on Vertex AI to connect to external data.","Google Cloud provides tools such as Pub/Sub, Cloud Storage, and Cloud SQL."],
    ans:3,
    desc:"The question specifically refers to streaming data and structured databases. Pub/Sub handles streaming data, Cloud SQL handles structured databases, and Cloud Storage provides general object storage. Together, Google Cloud provides a unified and scalable environment to gather, process, and prepare diverse data for machine learning."
  },
  {
    topic:2,num:2,
    q:"The office of the CISO wants to use generative AI (gen AI) to help automate tasks like summarizing case information, researching threats, and taking actions like creating detection rules. What agent should they use?",
    opts:["Data agent","Security agent","Customer service agent","Code agent"],
    ans:1,
    desc:"A Security agent is designed for cybersecurity and risk management tasks. It assists with threat detection, case summaries, and automating security actions. The other options: A) Data agent — helps collect, clean, and prepare data; C) Customer service agent — handles customer queries; D) Code agent — writes, reviews, and improves code."
  },
  {
    topic:2,num:3,
    q:"A financial services company receives a high volume of loan applications daily submitted as scanned documents and PDFs with varying layouts. The manual process of extracting key information is time-consuming and prone to errors. This causes delays in loan processing and impacts customer satisfaction. The company wants to automate the extraction of this critical data to improve efficiency and accuracy. Which Google Cloud tool should they use?",
    opts:["Document AI API","Natural Language API","Vision AI","Dataflow"],
    ans:0,
    desc:"Document AI API is the best fit because it extracts structured data from scanned documents and PDFs, even with varying layouts. It uses machine learning to understand and pull out key information like names, dates, and financial details."
  },
  {
    topic:2,num:4,
    q:"A security team needs a centralized platform to gain a comprehensive overview of their organization's security health across their entire Google Cloud environment, including potential threats to their generative AI deployments. Which Google Cloud security offering is specifically for this purpose?",
    opts:["Identity and Access Management","Workload monitoring tools","Security Command Center","Secure-Py-design infrastructure"],
    ans:2,
    desc:"Security Command Center (SCC) is Google Cloud's centralized vulnerability and threat reporting service. It provides comprehensive visibility and control over your cloud security posture, assets, and risks."
  },
  {
    topic:2,num:5,
    q:"An organization with a team of live customer service agents wants to improve agent efficiency and customer satisfaction during support interactions. They are looking for a tool that can provide real-time guidance to agents, suggest helpful information, and streamline the support process without fully automating customer conversations. Which component of Google's Customer Engagement Suite should they use?",
    opts:["Google Cloud Contact Center as a Service","Conversational Insights","Agent Assist","Conversational Agents"],
    ans:2,
    desc:"Agent Assist is designed to support live customer service agents by providing real-time guidance during conversations, suggesting relevant information and responses, and helping agents work faster and more accurately without replacing them."
  },

    opts:["1. Set up Cloud VPN to provide private network connectivity between the Compute Engine application and the on-premises MySQL server. 2. Stop the on-premises application. 3. Create a mysqldump of the on-premises MySQL server. 4. Upload the dump to a Cloud Storage bucket. 5. Import the dump into Cloud SQL. 6. Modify the source code of the application to write queries to both databases and read from its local database. 7. Start the Compute Engine application. 8. Stop the on-premises application.", "1. Set up Cloud SQL proxy and MySQL proxy. 2. Create a mysqldump of the on-premises MySQL server. 3. Upload the dump to a Cloud Storage bucket. 4. Import the dump into Cloud SQL. 5. Stop the on-premises application. 6. Start the Compute Engine application.", "1. Set up Cloud VPN to provide private network connectivity between the Compute Engine application and the on-premises MySQL server. 2. Stop the on-premises application. 3. Start the Compute Engine application, configured to read and write to the on-premises MySQL server. 4. Create the replication configuration in Cloud SQL. 5. Configure the source database server to accept connections from the Cloud SQL replica. 6. Finalize the Cloud SQL replica configuration. 7. When replication has been completed, stop the Compute Engine application. 8. Promote the Cloud SQL replica to a standalone instance. 9. Restart the Compute Engine application, configured to read and write to the Cloud SQL standalone instance.", "1. Stop the on-premises application. 2. Create a mysqldump of the on-premises MySQL server. 3. Upload the dump to a Cloud Storage bucket. 4. Import the dump into Cloud SQL. 5. Start the application on Compute Engine."],
    ans:[2],
    desc:"Configuring Cloud SQL as an external replica of the on-premises MySQL server lets initial replication happen in the background while the application keeps running unmodified against the on-premises database, minimizing both downtime and data loss since only a brief pause is needed at the very end to let replication fully catch up before promoting Cloud SQL to a standalone primary and repointing the application to it. Modifying the application to dual-write to both databases (option A) requires source code changes that violate the 'minimal modification' constraint and introduces risk of inconsistency between the two databases. The mysqldump-based approaches (options B and D) require stopping the on-premises application for the entire dump, upload, and import process, causing extended downtime, and any transactions that occur during that window are lost since there is no ongoing replication to capture them. Setting up the Cloud SQL replica against the live on-premises database, letting it synchronize, and only then performing a short cutover, as in option C, is the approach that achieves both minimal downtime and no data loss."
  },
  {

    opts:["Remove the default route on all VPCs. Move all approved instances into a new subnet that has a default route to an internet gateway.", "Create a new VPC in custom mode. Create a new subnet for the approved instances, and set a default route to the internet gateway on this new subnet.", "Implement a Cloud NAT solution to remove the need for external IP addresses entirely.", "Set an Organization Policy with a constraint on constraints/compute.vmExternalIpAccess. List the approved instances in the allowedValues list."],
    ans:[3],
    desc:"Google Cloud provides the organization policy constraint constraints/compute.vmExternalIpAccess specifically to control which VM instances are permitted to have external IP addresses across an entire organization, folder, or project hierarchy. Setting this constraint with a custom allowedValues list that references only the approved instances enforces the restriction centrally and consistently across all VPCs, regardless of who creates new instances. Removing default routes only affects outbound internet reachability and does not prevent an external IP from being assigned to an instance. Creating a new VPC with a route to an internet gateway does not restrict external IP assignment either, since routes and external IPs are independent settings. Cloud NAT lets instances without external IPs reach the internet, but it does not stop someone from assigning an external IP to an unapproved instance elsewhere. Only the organization policy constraint enforces this restriction declaratively at the organization level."

  {

  {
    topic:1,num:"115",
    q:"Your company has sensitive data in Cloud Storage buckets. Data analysts have Identity Access Management (IAM) permissions to read the buckets. You want to prevent data analysts from retrieving the data in the buckets from outside the office network. What should you do?",
    opts:["1. Create a VPC Service Controls perimeter that includes the projects with the buckets. 2. Create an access level with the CIDR of the office network.", "1. Create a firewall rule for all instances in the Virtual Private Cloud (VPC) network for source range. 2. Use the Classless Inter-domain Routing (CIDR) of the office network.", "1. Create a Cloud Function to remove IAM permissions from the buckets, and another Cloud Function to add IAM permissions to the buckets. 2. Schedule the Cloud Functions with Cloud Scheduler to add permissions at the start of business and remove permissions at the end of business.", "1. Create a Cloud VPN to the office network. 2. Configure Private Google Access for on-premises hosts."],
    ans:[0],
    desc:"VPC Service Controls creates a security perimeter around Google Cloud resources such as Cloud Storage buckets and can restrict access based on context, including the network location of the request. Defining an access level tied to the CIDR range of the office network ensures that even users with valid IAM read permissions cannot retrieve bucket data from outside that network, directly satisfying the requirement. Firewall rules operate on Compute Engine network traffic and have no effect on Cloud Storage API access, since that is a Google-managed service outside VPC firewall enforcement. Cycling IAM permissions on and off with Cloud Functions and Cloud Scheduler is an operationally fragile workaround that does not reliably enforce network-based restrictions and creates inconsistent access windows. Cloud VPN with Private Google Access enables private connectivity from on-premises to Google APIs but does not itself restrict access based on the requester's network location. VPC Service Controls is the purpose-built mechanism for this context-aware access restriction."
  },
  {
    topic:1,num:"116",
    q:"You have developed a non-critical update to your application that is running in a managed instance group, and have created a new instance template with the update that you want to release. To prevent any possible impact to the application, you don't want to update any running instances. You want any new instances that are created by the managed instance group to contain the new update. What should you do?",
    opts:["Start a new rolling restart operation.", "Start a new rolling replace operation.", "Start a new rolling update. Select the Proactive update mode.", "Start a new rolling update. Select the Opportunistic update mode."],
    ans:[3],
    desc:"Rolling updates on a managed instance group support two modes: proactive, which actively replaces existing instances with the new template immediately, and opportunistic, which only applies the update when instances are naturally recreated, such as during autoscaling or manual recreation, leaving currently running instances untouched. Because the goal is to avoid affecting running instances while ensuring new instances receive the update, opportunistic mode is the correct choice. A rolling restart simply reboots existing instances without changing their template, so it would not apply the new update at all. A rolling replace forcibly recreates instances, which violates the requirement not to affect running instances. Proactive update mode would immediately begin replacing running instances with the new template, again violating the stated constraint. Opportunistic mode is the only option that confines the update to new instances."
  },
  {
    topic:1,num:"117",
    q:"Your company is designing its application landscape on Compute Engine. Whenever a zonal outage occurs, the application should be restored in another zone as quickly as possible with the latest application data. You need to design the solution to meet this requirement. What should you do?",
    opts:["Create a snapshot schedule for the disk containing the application data. Whenever a zonal outage occurs, use the latest snapshot to restore the disk in the same zone.", "Configure the Compute Engine instances with an instance template for the application, and use a regional persistent disk for the application data. Whenever a zonal outage occurs, use the instance template to spin up the application in another zone in the same region. Use the regional persistent disk for the application data.", "Create a snapshot schedule for the disk containing the application data. Whenever a zonal outage occurs, use the latest snapshot to restore the disk in another zone within the same region.", "Configure the Compute Engine instances with an instance template for the application, and use a regional persistent disk for the application data. Whenever a zonal outage occurs, use the instance template to spin up the application in another region. Use the regional persistent disk for the application data."],
    ans:[1],
    desc:"Because the requirement is limited to recovering from a zonal outage, the solution needs to redeploy the application in a different zone within the same region while preserving the latest data, which is exactly what an instance template combined with a regional persistent disk provides. A regional persistent disk synchronously replicates data across two zones in a region, so data remains current and available even if one zone fails, and the instance template allows quick redeployment of the compute layer in the surviving zone. Snapshot-based approaches restore data from a point-in-time snapshot, which is not guaranteed to reflect the very latest writes and requires manual restore steps, making recovery slower and less current. Spinning the application up in a different region is unnecessary and over-engineered for a zonal-only outage, adding latency and complexity beyond the stated requirement. The instance template plus regional persistent disk combination best matches both the speed and data-currency requirements."
  },
  {
    topic:1,num:"118",
    q:"Your company has just acquired another company, and you have been asked to integrate their existing Google Cloud environment into your company's data center. Upon investigation, you discover that some of the RFC 1918 IP ranges being used in the new company's Virtual Private Cloud (VPC) overlap with your data center IP space. What should you do to enable connectivity and make sure that there are no routing conflicts when connectivity is established?",
    opts:["Create a Cloud VPN connection from the new VPC to the data center, create a Cloud Router, and apply new IP addresses so there is no overlapping IP space.", "Create a Cloud VPN connection from the new VPC to the data center, and create a Cloud NAT instance to perform NAT on the overlapping IP space.", "Create a Cloud VPN connection from the new VPC to the data center, create a Cloud Router, and apply a custom route advertisement to block the overlapping IP space.", "Create a Cloud VPN connection from the new VPC to the data center, and apply a firewall rule that blocks the overlapping IP space."],
    ans:[0],
    desc:"When two networks that need to be connected use overlapping RFC 1918 address ranges, routing between them becomes ambiguous because the same destination address could exist in both networks, and neither Cloud Router route advertisements nor firewall rules can resolve this ambiguity. Re-addressing the overlapping instances or subnets in the newly acquired VPC eliminates the conflict at its source and guarantees clean, unambiguous routing once Cloud VPN and Cloud Router are established. Cloud NAT is designed for outbound internet address translation and is not intended to resolve overlapping internal address space between two private networks. Blocking the overlapping ranges with a custom route advertisement would prevent connectivity to those ranges rather than enabling it, which does not meet the integration goal. A firewall rule blocking the overlapping space similarly prevents rather than enables the required connectivity. Re-addressing the conflicting ranges is the standard, reliable resolution for overlapping address space."
  },
  {
    topic:1,num:"119",
    q:"You need to migrate Hadoop jobs for your company's Data Science team without modifying the underlying infrastructure. You want to minimize costs and infrastructure management effort. What should you do?",
    opts:["Create a Dataproc cluster using standard worker instances.", "Create a Dataproc cluster using preemptible worker instances.", "Manually deploy a Hadoop cluster on Compute Engine using standard instances.", "Manually deploy a Hadoop cluster on Compute Engine using preemptible instances."],

    desc:"Dataproc is Google Cloud's managed Hadoop and Spark service, so migrating existing Hadoop jobs into a Dataproc cluster satisfies the requirement to avoid modifying the underlying infrastructure or job code, while eliminating the operational burden of manually managing a Hadoop cluster. Using preemptible secondary worker instances within the Dataproc cluster further reduces cost significantly, since preemptible VMs are billed at a much lower rate and suit the ephemeral, bursty nature of much Hadoop processing capacity. A standard-only Dataproc cluster meets the infrastructure requirement but forgoes the additional cost savings preemptible workers provide. Manually deploying Hadoop on Compute Engine, whether with standard or preemptible instances, still requires ongoing cluster provisioning and management effort, directly contradicting the goal of minimizing infrastructure management. Dataproc with preemptible workers best balances cost minimization and low management overhead."

    q:"Your company has a project in Google Cloud with three Virtual Private Clouds (VPCs). There is a Compute Engine instance on each VPC. Network subnets do not overlap and must remain separated. The network configuration is shown below.\nInstance #1 is an exception and must communicate directly with both Instance #2 and Instance #3 via internal IPs. How should you accomplish this?",
    opts:["Create a cloud router to advertise subnet #2 and subnet #3 to subnet #1.", "Add two additional NICs to Instance #1 with the following configuration: ג€¢ NIC1 ג—‹ VPC: VPC #2 ג—‹ SUBNETWORK: subnet #2 ג€¢ NIC2 ג—‹ VPC: VPC #3 ג—‹ SUBNETWORK: subnet #3 Update firewall rules to enable traffic between instances.", "Create two VPN tunnels via CloudVPN: ג€¢ 1 between VPC #1 and VPC #2. ג€¢ 1 between VPC #2 and VPC #3. Update firewall rules to enable traffic between the instances.", "Peer all three VPCs: ג€¢ Peer VPC #1 with VPC #2. ג€¢ Peer VPC #2 with VPC #3. Update firewall rules to enable traffic between the instances."],
    ans:[1],

  {
    topic:1,num:"121",
    q:"You need to deploy an application on Google Cloud that must run on a Debian Linux environment. The application requires extensive configuration in order to operate correctly. You want to ensure that you can install Debian distribution updates with minimal manual intervention whenever they become available. What should you do?",
    opts:["Create a Compute Engine instance template using the most recent Debian image. Create an instance from this template, and install and configure the application as part of the startup script. Repeat this process whenever a new Google-managed Debian image becomes available.", "Create a Debian-based Compute Engine instance, install and configure the application, and use OS patch management to install available updates.", "Create an instance with the latest available Debian image. Connect to the instance via SSH, and install and configure the application on the instance. Repeat this process whenever a new Google-managed Debian image becomes available.", "Create a Docker container with Debian as the base image. Install and configure the application as part of the Docker image creation process. Host the container on Google Kubernetes Engine and restart the container whenever a new update is available."],
    ans:[1],
    desc:"Compute Engine's OS patch management, part of VM Manager, allows administrators to automatically apply and schedule operating system updates, including Debian distribution updates, on running instances with minimal manual intervention. Deploying the instance once, installing and configuring the application, and then relying on patch management fulfills the requirement without repeated manual rebuilds. Recreating a new instance from an updated image every time a new Debian image is released requires manually repeating the setup process each time, contradicting the goal of minimal manual intervention, whether connecting via a startup script or SSH. Packaging the application in a Docker container on GKE shifts the update problem to rebuilding and redeploying container images whenever the base image changes, which is still a manual, recurring process rather than automated in-place patching. OS patch management is purpose-built for automating operating system updates on Compute Engine VMs."

  {
    topic:1,num:"122",
    q:"You have an application that runs in Google Kubernetes Engine (GKE). Over the last 2 weeks, customers have reported that a specific part of the application returns errors very frequently. You currently have no logging or monitoring solution enabled on your GKE cluster. You want to diagnose the problem, but you have not been able to replicate the issue. You want to cause minimal disruption to the application. What should you do?",
    opts:["1. Update your GKE cluster to use Cloud Operations for GKE. 2. Use the GKE Monitoring dashboard to investigate logs from affected Pods.", "1. Create a new GKE cluster with Cloud Operations for GKE enabled. 2. Migrate the affected Pods to the new cluster, and redirect traffic for those Pods to the new cluster. 3. Use the GKE Monitoring dashboard to investigate logs from affected Pods.", "1. Update your GKE cluster to use Cloud Operations for GKE, and deploy Prometheus. 2. Set an alert to trigger whenever the application returns an error.", "1. Create a new GKE cluster with Cloud Operations for GKE enabled, and deploy Prometheus. 2. Migrate the affected Pods to the new cluster, and redirect traffic for those Pods to the new cluster. 3. Set an alert to trigger whenever the application returns an error."],
    ans:[0],
    desc:"Enabling Cloud Operations, formerly Stackdriver, for the existing GKE cluster turns on both logging and monitoring without requiring any migration of workloads, and the GKE Monitoring dashboard can then be used to inspect logs and metrics from the affected Pods to pinpoint the source of errors. This approach causes essentially no disruption to the running application, satisfying the stated constraint. Creating a new cluster and migrating the affected Pods introduces unnecessary risk and downtime just to enable observability, a heavier-handed change than needed. Deploying Prometheus in addition to Cloud Operations adds operational overhead not required simply to diagnose an existing issue, and setting up alerts does not help retroactively diagnose a problem that has already occurred without first having logs to analyze. Creating an entirely new cluster with Prometheus compounds both of these drawbacks. Enabling Cloud Operations on the existing cluster is the least disruptive path to the needed diagnostic data."

  {
    topic:1,num:"123",
    q:"You need to deploy a stateful workload on Google Cloud. The workload can scale horizontally, but each instance needs to read and write to the same POSIX filesystem. At high load, the stateful workload needs to support up to 100 MB/s of writes. What should you do?",
    opts:["Use a persistent disk for each instance.", "Use a regional persistent disk for each instance.", "Create a Cloud Filestore instance and mount it in each instance.", "Create a Cloud Storage bucket and mount it in each instance using gcsfuse."],
    ans:[2],
    desc:"Cloud Filestore provides a fully managed, POSIX-compliant network file system that can be mounted concurrently by multiple Compute Engine or GKE instances, making it well suited for a horizontally scaled stateful workload needing shared read/write access, and its performance tiers can sustain the required 100 MB/s of throughput. A standard persistent disk can only be attached in read/write mode to a single instance, so it cannot serve multiple instances that all need to write to the same filesystem. A regional persistent disk still fundamentally provides block storage tied to one primary writer instance and is not a shared POSIX filesystem across many instances. A Cloud Storage bucket mounted via gcsfuse exposes an object storage interface that emulates a filesystem but does not provide true POSIX semantics or the consistent high-throughput random write performance the workload requires. Filestore is the service specifically designed for this shared, high-throughput POSIX filesystem use case."
  },
  {

    q:"Your company has an application deployed on Anthos clusters (formerly Anthos GKE) that is running multiple microservices. The cluster has both Anthos Service\nMesh and Anthos Config Management configured. End users inform you that the application is responding very slowly. You want to identify the microservice that is causing the delay. What should you do?",

    opts:["Create a retention policy on the bucket for the duration of 5 years. Create a lock on the retention policy.", "Create the bucket with uniform bucket-level access, and grant a service account the role of Object Writer. Use the service account to upload new files.", "Use a customer-managed key for the encryption of the bucket. Rotate the key after 5 years.", "Create the bucket with fine-grained access control, and grant a service account the role of Object Writer. Use the service account to upload new files."],
    ans:[0],
    desc:"A Cloud Storage bucket retention policy prevents objects from being deleted or overwritten until they reach a specified minimum age, and locking that policy makes it immutable, guaranteeing a fixed, unmodifiable retention period, exactly the WORM-style guarantee the financial institution needs for five years. Granting a service account the Object Writer role, whether with uniform or fine-grained bucket-level access, still permits deletion or overwriting through IAM permissions, since IAM alone does not prevent an authorized principal from removing objects. Using a customer-managed encryption key with rotation only affects how data is encrypted and has no bearing on whether an object can be deleted or replaced. Only a locked retention policy provides an enforceable, tamper-proof guarantee against deletion or overwriting for the required duration."

  {
    topic:1,num:"126",
    q:"Your team will start developing a new application using microservices architecture on Kubernetes Engine. As part of the development lifecycle, any code change that has been pushed to the remote develop branch on your GitHub repository should be built and tested automatically. When the build and test are successful, the relevant microservice will be deployed automatically in the development environment. You want to ensure that all code deployed in the development environment follows this process. What should you do?",
    opts:["Have each developer install a pre-commit hook on their workstation that tests the code and builds the container when committing on the development branch. After a successful commit, have the developer deploy the newly built container image on the development cluster.", "Install a post-commit hook on the remote git repository that tests the code and builds the container when code is pushed to the development branch. After a successful commit, have the developer deploy the newly built container image on the development cluster.", "Create a Cloud Build trigger based on the development branch that tests the code, builds the container, and stores it in Container Registry. Create a deployment pipeline that watches for new images and deploys the new image on the development cluster. Ensure only the deployment tool has access to deploy new versions.", "Create a Cloud Build trigger based on the development branch to build a new container image and store it in Container Registry. Rely on Vulnerability Scanning to ensure the code tests succeed. As the final step of the Cloud Build process, deploy the new container image on the development cluster. Ensure only Cloud Build has access to deploy new versions."],
    ans:[2],
    desc:"A Cloud Build trigger tied to the development branch automatically builds and tests code on every push, and storing the resulting image in Container Registry keeps a versioned artifact; a separate deployment pipeline that watches for new images and deploys only through a restricted deployment tool ensures every change reaching the development cluster passed the required build-and-test gate. Pre-commit hooks on individual workstations, or post-commit hooks on the repository followed by a manual developer deployment, both depend on the developer performing a manual deploy step afterward, which cannot guarantee that every change follows the same automated process and leaves room for inconsistency. Relying on vulnerability scanning as a substitute for actual code testing does not verify functional correctness, and having Cloud Build itself perform the deployment as its final step blurs the separation between build and deploy responsibilities, weakening the guarantee that only an authorized deployment mechanism can push to the cluster. The trigger-plus-dedicated-pipeline design best enforces a consistent, automated, access-controlled workflow."
  },
  {

    q:"Your operations team has asked you to help diagnose a performance issue in a production application that runs on Compute Engine. The application is dropping requests that reach it when under heavy load. The process list for affected instances shows a single application process that is consuming all available CPU, and autoscaling has reached the upper limit of instances. There is no abnormal load on any other related systems, including the database. You want to allow production traffic to be served again as quickly as possible. Which action should you recommend?",
    opts:["Change the autoscaling metric to agent.googleapis.com/memory/percent_used.", "Restart the affected instances on a staggered schedule.", "SSH to each instance and restart the application process.", "Increase the maximum number of instances in the autoscaling group."],

  {
    topic:1,num:"128",
    q:"You are implementing the infrastructure for a web service on Google Cloud. The web service needs to receive and store the data from 500,000 requests per second. The data will be queried later in real time, based on exact matches of a known set of attributes. There will be periods where the web service will not receive any requests. The business wants to keep costs low. Which web service platform and database should you use for the application?",
    opts:["Cloud Run and BigQuery", "Cloud Run and Cloud Bigtable", "A Compute Engine autoscaling managed instance group and BigQuery", "A Compute Engine autoscaling managed instance group and Cloud Bigtable"],
    ans:[1],
    desc:"Cloud Bigtable is designed for extremely high-throughput, low-latency workloads with massive write volumes and fast lookups by row key, making it the right fit for storing and querying 500,000 requests per second based on exact attribute matches, whereas BigQuery is optimized for analytical, large-scale scans rather than high-frequency point queries and sustained heavy writes. Cloud Run is a serverless container platform that scales to zero when idle and scales up automatically during spikes, keeping costs low during idle periods while still handling occasional surges, which is more cost-effective than an always-provisioned Compute Engine managed instance group. Pairing Cloud Run with BigQuery uses the wrong database for this write-heavy, point-lookup access pattern. The Compute Engine options keep VMs running even during idle periods, which is less cost-effective than a scale-to-zero serverless platform. Cloud Run combined with Cloud Bigtable satisfies both the performance and cost requirements."
  },
  {
    topic:1,num:"129",
    q:"You are developing an application using different microservices that should remain internal to the cluster. You want to be able to configure each microservice with a specific number of replicas. You also want to be able to address a specific microservice from any other microservice in a uniform way, regardless of the number of replicas the microservice scales to. You need to implement this solution on Google Kubernetes Engine. What should you do?",
    opts:["Deploy each microservice as a Deployment. Expose the Deployment in the cluster using a Service, and use the Service DNS name to address it from other microservices within the cluster.", "Deploy each microservice as a Deployment. Expose the Deployment in the cluster using an Ingress, and use the Ingress IP address to address the Deployment from other microservices within the cluster.", "Deploy each microservice as a Pod. Expose the Pod in the cluster using a Service, and use the Service DNS name to address the microservice from other microservices within the cluster.", "Deploy each microservice as a Pod. Expose the Pod in the cluster using an Ingress, and use the Ingress IP address name to address the Pod from other microservices within the cluster."],
    ans:[0],
    desc:"A Kubernetes Deployment manages a specified number of Pod replicas for a microservice and handles scaling and self-healing automatically, while a Service provides a stable, cluster-internal DNS name and virtual IP that automatically load-balances traffic across all current replicas regardless of how many exist at any moment. This combination lets other microservices always address a dependency by its stable Service DNS name without tracking individual Pod IPs or replica counts. Exposing a Deployment through an Ingress is intended primarily for routing external HTTP(S) traffic into the cluster, not for internal service-to-service addressing, and its IP is not designed for uniform internal lookups. Deploying microservices directly as bare Pods forgoes the replica management, self-healing, and rolling update capabilities a Deployment provides, making it a poor fit for a horizontally scalable microservice. The Deployment-plus-Service pattern is the standard, recommended way to meet both the scaling and stable-addressing requirements."
  },
  {
    topic:1,num:"130",
    q:"Your company has a networking team and a development team. The development team runs applications on Compute Engine instances that contain sensitive data. The development team requires administrative permissions for Compute Engine. Your company requires all network resources to be managed by the networking team. The development team does not want the networking team to have access to the sensitive data on the instances. What should you do?",
    opts:["1. Create a project with a standalone VPC and assign the Network Admin role to the networking team. 2. Create a second project with a standalone VPC and assign the Compute Admin role to the development team. 3. Use Cloud VPN to join the two VPCs.", "1. Create a project with a standalone Virtual Private Cloud (VPC), assign the Network Admin role to the networking team, and assign the Compute Admin role to the development team.", "1. Create a project with a Shared VPC and assign the Network Admin role to the networking team. 2. Create a second project without a VPC, configure it as a Shared VPC service project, and assign the Compute Admin role to the development team.", "1. Create a project with a standalone VPC and assign the Network Admin role to the networking team. 2. Create a second project with a standalone VPC and assign the Compute Admin role to the development team. 3. Use VPC Peering to join the two VPCs."],
    ans:[2],
    desc:"Shared VPC lets a host project centrally own and manage all networking resources, with the Network Admin role granted there to the networking team, while one or more service projects attach to that shared network for the purpose of creating compute resources; granting the Compute Admin role in the service project to the development team gives them full administrative control over their instances without ever needing access to the host project or its networking configuration. Because the sensitive data lives on instances in the service project and network administration is isolated in the host project, the networking team never gains access to instance-level data while still centrally controlling all network resources. Standalone VPCs joined by Cloud VPN or by VPC Peering needlessly duplicate networking resources across two independently managed VPCs, working against the requirement that networking be centrally managed by one team. Assigning both roles within a single shared project and VPC would put the networking team, as owners of that project's network, in closer proximity to the compute resources and data, conflicting with the isolation requirement. The Shared VPC host and service project model is exactly the architecture designed for this separation of duties."

    opts:["Schedule a cron job with Cloud Scheduler. The scheduled job queries the logs every minute for the relevant events.", "Export logs to BigQuery, and trigger a query in BigQuery to process the log data for the relevant events.", "Export logs to a Pub/Sub topic, and trigger Cloud Function with the relevant log events.", "Export logs to a Cloud Storage bucket, and trigger Cloud Run with the relevant log events."],

    opts:["Store all transaction data in a Cloud Storage bucket using the Standard storage class for the entire five-year retention period.", "Ingest all data into BigQuery using time-partitioned tables, and rely on BigQuery’s automatic long-term storage pricing for data older than 90 days.", "Configure a Cloud Storage bucket with an Object Lifecycle Management policy to transition data from the Standard class to the Archive class after 30 days.", "Configure a Cloud Storage bucket with an Object Lifecycle Management policy to transition data from the Standard class to the Coldline class after 30 days."],

udience with intelligent toots for content discovery, personalized recommendations, and seamless interaction. Reliability and cost management are our top priorities. This strategic initiative will deepen engagement, foster customer loyalty, and unlock new revenue streams through targeted marketing and tailored content offerings. We see a future where Al-driven innovation is central to our business, leading to greater success for our company and delivering exceptional value to our customers.\nFor this question, refer to the Altostrat Media case study. Altostrat needs to analyze the performance of its media processing pipeline running on Java-based Cloud Run function. You need to select the most effective tool for the task. What should you do?",

udience with intelligent toots for content discovery, personalized recommendations, and seamless interaction. Reliability and cost management are our top priorities. This strategic initiative will deepen engagement, foster customer loyalty, and unlock new revenue streams through targeted marketing and tailored content offerings. We see a future where Al-driven innovation is central to our business, leading to greater success for our company and delivering exceptional value to our customers.\nFor this question, refer to the Altostrat Media case study. Altostrat is using Apigee for API management and wants to ensure their APIs are protected from overuse and abuse. You need to implement an Apigee feature to control the total number of API calls for cost management. What should you do?",

  {
    topic:1,num:"225",
    q:"Company Overview -\nKnightMotives is a car manufacturer specializing in autonomous, self-driving vehicles, including Battery Electric Vehicles (BEVs), hybrids and traditional internal combustion engine (ICE) vehicles. While KnightMotives has made strides with the in-vehicle experience in their BEV fleet, the hybrid and ICE vehicles have yet to implement these new systems and are viewed poorly by critics and drivers. The lack of modern in-vehicle technology in hybrid and ICE vehicles has resulted in declining sales and customer satisfaction.\nKnightMotives wants to modernize the consumer experience across all vehicles within five years Artificial Intelligence offers a unique opportunity to revolutionize the in-vehicle experience, as well as the shopping buying and service/maintenance experience. Investment in this new technology will require a shift in financial priorities on a global scale.\nKnightMotives also wants to improve their online ordering system, which is unreliable. Systems for customers to build their vehicle online for acquisition through a dealer are not delivering the data or reliability that dealers need, causing. A strain in the relationship between KnightMotives and dealers. Service technicians and sales staff need better tooling to enhance dealer successes, including built-to-order vehicles.\nSolution Concept -\nKnightMotives wants to shift from manufacturing cars to creating a complete and compelling “automotive experience.” Then strategy prioritizes delivering a consistent experience across all models, developing AI-powered features, generating new revenue from data monetization, adopting a digital focus to differentiate their brand from competitors, and developing better tools for mechanics and salespeople.\nExisting Technical Environment -\nKnightMotives's IT is largely on-premises with some applications on major cloud platforms. Their supply chain runs on an outdated mainframe, and Enterprise Resource Planning (ERP) is also outdated, making new promotions and dealer discounts difficult to implement. Dealers have no budget for new equipment. There is fragmentation across vehicles with multiple code bases, and significant technical debt from supporting backwards compatibility. Network connectivity to manufacturing plants and vehicle connectivity in rural areas are challenges.\nBusiness Requirements -\nKey business requirements include fostering a personalized relationship with the driver and delivering a cohesive experience across all models. Creating a better build-to-order model will reduce time on the lot and provide transparency for both dealers and customers. Additionally, KnightMotives seeks to monetize corporate data to finance new technology investments, as their current AI infrastructure is obsolete and corporate data remains siloed. Security is a paramount concern due to past data breaches Adherence to European Union (EU) data protection regulations, especially for emerging autonomous platforms, is critical.\nKnightMotives plans to make significant investments in fully autonomous driving capabilities, with initial implementation targeting regions with favorable regulatory environments. Prioritizing employee upskilling, attracting top-tier talent, and fostering better communication between business and technical teams are also critical objectives.\nTechnical Requirements -\n•	Modernizing the in-vehicle experience includes developing a consistent user experience (UX) that seamlessly integrates AI-powered features across all models, updating in-vehicle hardware and software in legacy models to support new UX features and AI capabilities, and ensuring reliable network connectivity, especially in rural areas, to support real-time AI features and data transmission.\n•	Network upgrades are necessary to support increased data traffic and improve connectivity between plants and headquarters.\n•	IT infrastructure modernization requires adopting a hybrid cloud strategy to leverage the benefits of both on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. KnightMotives has developed a new car configurator application to enhance both the dealer and customer experience. The new application will be deployed on Google Kubernetes Engine (GKE) KnightMotives wants you to replicate the deployment of the application across multiple locations to ensure this critical application is always available over the internet, even during regional outages. What should you do?",
    opts:["Create multiple GKE clusters in different regions. Deploy part of the microservices of the app in different clusters. Configure a multi-cluster Cloud Service Mesh.", "Create multiple GKE clusters in different regions. Deploy the app on every cluster. Configure a multi-cluster Cloud Service Mesh.", "Create a fleet of GKE clusters in different regions Deploy part of the microservices of the app in different clusters Configure a multi-cluster Gateway.", "Create a fleet of GKE clusters in different regions. Deploy the app on every cluster. Configure a multi-cluster Gateway."],
    ans:[3],
    desc:"Deploying the full application to every regional GKE cluster and exposing it through a multi-cluster Gateway is the correct pattern for an internet-facing application that must survive a regional outage. Running the complete app (not just a subset of microservices) in each cluster means any single region can serve requests independently, so a regional failure never leaves part of the application unreachable everywhere. GKE fleets are the prerequisite grouping construct for configuring a multi-cluster Gateway, which is Google's current recommended mechanism for global external load balancing across clusters with automatic health-based routing. Splitting microservices across clusters (the two options that partition the app) creates cross-cluster dependencies that reduce, rather than increase, availability during an outage. Cloud Service Mesh is primarily designed for east-west service-to-service traffic management, not for external internet-facing routing and failover, making multi-cluster Gateway the better fit here."
  },

th on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study. As part of its development of fully autonomous driving vehicles. KnightMotives wants to analyze all vehicle sensor data during test drives. The analysis will enable KnightMotives to improve its software based on insights from this data.\n•	Different event types, such as parking, overtaking and navigating, need to be analyzed. Each test vehicle and event type has an ID.\n•	Different categories of sensors, such as cameras, radars, and ultrasonic beams, also need to be analyzed. During each autonomously-initiated event, data from multiple sensors will be captured and sent to Google Cloud where the data will be stored in Bigtable.\nDuring data analysis, you want to be able to retrieve all sensor data of occurrences of the same event type for a specific vehicle within a specific interval of time. You need to design a Bigtable schema that is optimized for read performance. What should you do?",
    opts:["Use the sensor category, event ID, and timestamp (in that order) as the row key. Create a column family for each individual sensor and a column qualifier for each vehicle.", "Use the timestamp, vehicle ID, and event ID (in that order) as the row key. Create a column family per sensor category, and use a column qualifier for each individual sensor within its respective category.", "Use the vehicle ID, event ID, and timestamp (in that order) as the row key. Create a column family per sensor category, and use a column qualifier for each individual sensor within its respective category.", "Use the vehicle ID and event ID (in that order) as the row key. Create a column family per sensor category, and use a column qualifier for each individual sensor within its respective category. Utilize the timestamped versions of a cell to distinguish between different moments in time of similar events."],
    ans:[2],
    desc:"A row key of vehicle ID, event ID, then timestamp lets Bigtable scan a contiguous range of rows for a specific vehicle and event type over a time interval, which directly matches the required access pattern. Organizing sensor readings into a column family per sensor category, with a column qualifier per individual sensor, groups related data together for efficient reads and follows Bigtable schema design best practices. Placing the sensor category or timestamp first in the row key (as in the other two ordering options) prevents efficient filtering by vehicle and, in the timestamp-first case, causes write hotspotting since sequential writes land on the same tablet. Using only vehicle ID and event ID as the row key while relying on cell versioning to distinguish time (the remaining option) sacrifices the ability to do efficient row-range scans over a time interval and is not how Bigtable is intended to model many discrete time-stamped readings."

th on-premises and cloud infrastructure, and gradually modernizing or replacing legacy systems to improve efficiency and agility.\n•	Autonomous vehicle development and testing requires investing in cutting-edge AI and machine learning technologies, building a robust simulation environment, and ensuring compliance with evolving regulations related to autonomous vehicles.\n•	Data monetization and insights requires implementing a robust data management platform, strict data security and privacy measures, and a scalable AI/ML infrastructure.\n•	Increased focus on security and risk management involves implementing a comprehensive security framework to protect against cyber threats and data breaches, developing an incident response plan, and providing security awareness training to employees.\n•	Providing a delightful experience for dealers and customers requires improving the online build-to-order system; developing modern dealer tools to streamline dealer operations, including sales, service, and inventory management; and implementing a comprehensive Customer Relationship Management (CRM) system to track customer interactions personalize experiences, and improve customer satisfaction.\nExecutive Statement -\nKnightMotives is committed to enhancing safety and saving lives by leveraging an extensive body of data — encompassing driving, road conditions, behavioral studies, and crash safety statistics — to create compelling digital experiences for drivers. Our AI consistently outperforms national safety statistics, ensuring the unique and coveted KnightMotives experience is aligned across all our vehicle models.\nMichael Knight, KnightMotives CEO\nFor this question, refer to the KnightMotives Automotive case study, KnightMotives has deployed their new Dealer Tools on Google Kubernetes Engine (GKE). You are supporting KnightMotives in the performance of the GKE workloads. Some of the Pods are Statefull. To ensure these Pods do not consume an unlimited amount of CPU, you have configured resource limits on the Deployments. You have identified that these Pods were allocated too much CPU and are actually consuming drastically less some of the time. You want to optimize resource usage and allow maximum flexibility in case of higher load. What should you do?",
